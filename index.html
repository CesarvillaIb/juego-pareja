<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 P & F: Mega Hardcore Edition 🔥</title>
    <style>
        :root { --accent: #00f2ff; --bg: #050505; --gold: #ffd700; --deep-red: #ff0033; --green: #2ecc71; --pink: #ff1493; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; padding-bottom: 50px; }
        .header { padding: 15px; background: #111; border-bottom: 2px solid var(--deep-red); }
        .mode-selector { display: flex; justify-content: center; gap: 5px; margin: 10px 0; }
        .mode-btn { padding: 10px; border: 1px solid #333; background: #000; color: #666; border-radius: 10px; font-size: 11px; cursor: pointer; flex: 1; max-width: 150px; }
        .mode-btn.active { border-color: var(--accent); color: white; box-shadow: 0 0 10px var(--accent); }
        
        .dice-container { margin: 20px auto; width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--accent); display: flex; align-items: center; justify-content: center; position: relative; }
        #dice { font-size: 50px; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: inline-block; }

        /* Estilos Ruleta */
        #roulette-box { display: none; width: 150px; height: 150px; border-radius: 50%; border: 5px solid white; margin: 20px auto; position: relative; transition: transform 3s cubic-bezier(0.1, 0, 0.2, 1); background: conic-gradient(var(--pink) 0% 50%, #3498db 50% 100%); }
        .pointer { display: none; width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid white; margin: 0 auto; position: relative; z-index: 10; top: 10px; }

        .btn { width: 90%; max-width: 350px; padding: 20px; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; margin: 10px 0; transition: 0.3s; }
        .btn-main { background: linear-gradient(45deg, var(--deep-red), #8a2be2); }
        .btn-challenge { background: linear-gradient(45deg, #444, #111); border: 1px solid var(--gold); color: var(--gold); }
        .btn-punish { background: linear-gradient(45deg, #ff8c00, var(--pink)); box-shadow: 0 0 15px var(--pink); }
        .btn-start { background: var(--green); display: none; box-shadow: 0 0 20px var(--green); margin-top: 10px; }
        
        #timer { font-size: 75px; font-weight: bold; margin: 10px 0; font-family: monospace; color: #fff; }
        #resultado { width: 92%; margin: 0 auto; }
        .card { background: #111; border-left: 5px solid var(--accent); padding: 20px; border-radius: 15px; text-align: left; margin-bottom: 15px; animation: slideIn 0.5s ease; }
        .card-t { font-size: 19px; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        .card-d { font-size: 14px; color: var(--gold); margin: 8px 0; font-style: italic; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .role-box { margin-top: 12px; font-size: 14px; }
        .role-p { color: #3498db; margin-bottom: 12px; line-height: 1.4; }
        .role-f { color: #e74c3c; line-height: 1.4; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>PAULO & FERNANDA</h1>
        <div class="mode-selector">
            <div id="m-esc" class="mode-btn active" onclick="setModo('escalada')">MODO ESCALADA</div>
            <div id="m-des" class="mode-btn" onclick="setModo('desafio')">RETOS EXTREMOS</div>
        </div>
        <div id="fase-tag" style="font-size: 12px; color: var(--accent);">NIVEL 1: CALENTAMIENTO</div>
    </div>

    <div class="pointer" id="pointer"></div>
    <div id="roulette-box"></div>

    <div class="dice-container" id="dice-box"><div id="dice">🎲</div></div>

    <button id="btn-escalada" class="btn btn-main" onclick="jugar()">🔥 GIRAR DADO</button>
    <button id="btn-desafio" class="btn btn-challenge" style="display:none;" onclick="lanzarReto()">😈 RETO ALEATORIO</button>
    <button id="btn-punish" class="btn btn-punish" onclick="girarRuleta()">🎡 RULETA DE CASTIGOS</button>
    
    <div id="timer">00:00</div>
    <button id="btn-iniciar-timer" class="btn btn-start" onclick="activarReloj()">▶️ EMPEZAR AHORA</button>

    <div id="resultado"></div>

    <script>
        let clicksEnNivel = 0;
        let nivel = 1;
        let timerInterval;
        let segundosPendientes = 0;
        let currentRotation = 0;

        const acciones = {
            fase1: [
                { t: "MASAJE CON LENGUA", d: "Exploración sensorial.", p: "Paulo: Lame desde su nuca hasta el coxis lentamente.", f: "Fernanda: Arquea la espalda al sentir su lengua.", s: 120 },
                { t: "SUCCIÓN DE PEZONES", d: "Estimulación alta.", p: "Paulo: Succiona y muerde levemente.", f: "Fernanda: Mastúrbalo con ritmo constante.", s: 180 }
            ],
            fase2: [
                { t: "PERRITO DE RODILLAS", d: "Penetración profunda.", p: "Paulo: Arrodillado detrás de ella. Empujes largos.", f: "Fernanda: Baja los codos, trasero arriba.", s: 180 },
                { t: "MISIONERO ELEVADO", d: "Conexión total.", p: "Paulo: Sujeta sus tobillos cerca de tus orejas.", f: "Fernanda: Pon almohadas bajo tu cadera.", s: 240 }
            ],
            fase3: [
                { t: "CLÍMAX LIBRE", d: "Final explosivo.", p: "Paulo: Elige tu posición favorita y busca tu final.", f: "Fernanda: No te guardes nada. Disfruta el momento.", s: 600 }
            ]
        };

        const retos = [
            { t: "EL 69", d: "Placer dual.", p: "Paulo: Boca arriba, Fernanda encima al revés.", f: "Fernanda: Tu cara en su entrepierna.", s: 180 },
            { t: "VAQUERA EN CUCLILLAS", d: "Control de Fernanda.", p: "Paulo: Acostado, sujeta sus caderas.", f: "Fernanda: De cuclillas sobre él, bota con fuerza.", s: 150 }
        ];

        const castigosP = [
            { t: "CASTIGO PAULO: ESCLAVO DEL CLÍTORIS", p: "Paulo: Usa solo tu lengua por 5 min. Círculos rápidos y firmes. Manos atrás.", f: "Fernanda: Siéntate en su cara. Tú marcas el ritmo. Si se cansa, dale una nalgada.", s: 300 },
            { t: "CASTIGO PAULO: LA SILLA DE PLACER", p: "Paulo: Arrodíllate entre sus piernas mientras ella está sentada. Úsala oralmente con intensidad.", f: "Fernanda: Sujétalo del cabello para marcar la velocidad que quieres.", s: 300 },
            { t: "CASTIGO PAULO: PENETRACIÓN DEDOS", p: "Paulo: Introduce 2 dedos palma arriba (ven aquí) buscando su punto G rítmicamente.", f: "Fernanda: Tócate el clítoris mientras Paulo te penetra con sus dedos.", s: 300 }
        ];

        const castigosF = [
            { t: "CASTIGO FERNANDA: FINAL EN LA CARA", p: "Paulo: Mastúrbate frente a ella y termina sobre sus ojos y boca.", f: "Fernanda: De rodillas, manos atrás. No te limpies hasta que él mande.", s: 300 },
            { t: "CASTIGO FERNANDA: FINAL EN NALGAS", p: "Paulo: Ponla en posición de perrito. Termina sobre sus nalgas y espárcelo.", f: "Fernanda: Quédate quieta y siente cómo él te cubre.", s: 300 }
        ];

        function girarRuleta() {
            resetUI();
            document.getElementById('dice-box').style.display = "none";
            const wheel = document.getElementById('roulette-box');
            const pointer = document.getElementById('pointer');
            wheel.style.display = "block";
            pointer.style.display = "block";

            const extraDeg = Math.floor(Math.random() * 360) + 1440;
            currentRotation += extraDeg;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            hablar("Girando la ruleta de castigos");

            setTimeout(() => {
                const realDeg = currentRotation % 360;
                let ganador = (realDeg <= 180) ? "FERNANDA" : "PAULO";
                hablar("El castigo es para " + ganador);
                
                let lista = (ganador === "PAULO") ? castigosP : castigosF;
                const item = lista[Math.floor(Math.random() * lista.length)];
                
                mostrar(item, '#ff1493');
            }, 3200);
        }

        function setModo(m) {
            document.getElementById('m-esc').className = 'mode-btn ' + (m=='escalada'?'active':'');
            document.getElementById('m-des').className = 'mode-btn ' + (m=='desafio'?'active':'');
            document.getElementById('btn-escalada').style.display = m=='escalada'?'inline-block':'none';
            document.getElementById('btn-desafio').style.display = m=='desafio'?'inline-block':'none';
            resetUI();
        }

        function resetUI() {
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = "00:00";
            document.getElementById('btn-iniciar-timer').style.display = "none";
            document.getElementById('resultado').innerHTML = "";
            document.getElementById('dice-box').style.display = "flex";
            document.getElementById('roulette-box').style.display = "none";
            document.getElementById('pointer').style.display = "none";
        }

        function hablar(texto) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-ES';
            window.speechSynthesis.speak(msg);
        }

        function jugar() {
            clicksEnNivel++;
            if(clicksEnNivel > 4) { nivel++; clicksEnNivel = 0; } 
            let lista = nivel <= 2 ? acciones.fase1 : (nivel <= 4 ? acciones.fase2 : acciones.fase3);
            mostrar(lista[Math.floor(Math.random() * lista.length)], '#00f2ff');
            document.getElementById('fase-tag').innerText = "NIVEL " + (nivel > 3 ? 3 : nivel);
        }

        function lanzarReto() {
            mostrar(retos[Math.floor(Math.random() * retos.length)], '#ffd700');
        }

        function mostrar(item, color) {
            document.getElementById('dice').style.transform = "rotate(720deg)";
            segundosPendientes = item.s;
            setTimeout(() => {
                document.getElementById('resultado').innerHTML = `
                    <div class="card" style="border-color:${color}">
                        <div class="card-t">${item.t}</div>
                        <div class="role-box">
                            <div class="role-p"><b>♂ PAULO:</b> ${item.p}</div>
                            <div class="role-f"><b>♀ FERNANDA:</b> ${item.f}</div>
                        </div>
                    </div>
                `;
                hablar(item.t);
                document.getElementById('btn-iniciar-timer').style.display = "inline-block";
            }, 600);
        }

        function activarReloj() {
            document.getElementById('btn-iniciar-timer').style.display = "none";
            let s = segundosPendientes;
            hablar("Iniciando tiempo");
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let m = Math.floor(s/60); let r = s%60;
                document.getElementById('timer').innerText = `${m}:${r<10?'0':''}${r}`;
                if(s-- <= 0) { 
                    clearInterval(timerInterval); 
                    hablar("Tiempo cumplido"); 
                }
            }, 1000);
        }
    </script>
</body>
</html>
