<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔥 PAULO & FERNANDA: EXTREME 🔥</title>
    <style>
        :root { 
            --accent: #00f2ff; --bg: #050505; --card-bg: #111;
            --gold: #ffd700; --deep-red: #ff0033; --purple: #a020f0; --pink: #ff1493; --green: #2ecc71;
            --flash: #ff0000;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { 
            margin: 0; font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: white; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
        }
        .header { 
            padding: 45px 20px 15px; background: rgba(0,0,0,0.95); 
            border-bottom: 2px solid var(--deep-red); position: fixed; top: 0; width: 100%; z-index: 100;
        }
        .content { 
            flex: 1; margin-top: 100px; margin-bottom: 85px; 
            overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        .visual-container { position: relative; height: 140px; display: flex; align-items: center; justify-content: center; width: 100%; }
        .icon-circle { 
            width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--accent);
            display: flex; align-items: center; justify-content: center; font-size: 40px;
            background: radial-gradient(circle, rgba(0,242,255,0.1) 0%, transparent 70%);
            transition: 0.3s;
        }
        .ruleta-box { display: none; position: relative; width: 150px; height: 150px; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 4px solid white; transition: transform 3.5s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(#3498db 0% 50%, var(--pink) 50% 100%); }
        #timer { font-size: 55px; font-weight: 900; margin: 5px 0; font-family: 'Courier New', monospace; text-shadow: 0 0 15px var(--accent); }
        .btn { width: 100%; max-width: 320px; padding: 18px; border: none; border-radius: 20px; font-size: 16px; font-weight: 800; color: white; margin-bottom: 10px; transition: 0.2s; text-transform: uppercase; }
        .btn-main { background: linear-gradient(45deg, var(--deep-red), var(--purple)); }
        .btn-flash { background: linear-gradient(45deg, #f00, #b00); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .card { background: var(--card-bg); border-left: 6px solid var(--accent); padding: 20px; border-radius: 18px; width: 100%; max-width: 400px; margin-top: 10px; animation: slide 0.4s ease-out; }
        @keyframes slide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: #000; display: flex; justify-content: space-around; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; color: #444; }
        .nav-item.active { color: var(--accent); }
        .nav-item.special { color: var(--flash); }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="text-align:center; font-size:16px; margin:0; letter-spacing:2px;">PAULO & FERNANDA</h1>
        <div id="fase-tag" style="text-align:center; font-size:10px; color:var(--accent); font-weight:bold;">MODO SELECCIONADO</div>
    </div>

    <div class="content">
        <div class="visual-container" id="v-cont">
            <div class="icon-circle" id="mode-icon">🔥</div>
            <div class="ruleta-box" id="ruleta-ui"><div id="wheel"></div></div>
        </div>
        <div id="action-area" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
        <div id="timer">00:00</div>
        <button id="btn-timer" class="btn" style="background:var(--green); display:none;" onclick="activarReloj()">▶️ COMENZAR</button>
        <div id="resultado"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="setModo('escalada', this)"><span>🔥</span>ESCALADA</div>
        <div class="nav-item" onclick="setModo('desafio', this)"><span>😈</span>RETOS</div>
        <div class="nav-item special" onclick="setModo('flash', this)"><span>⚡</span>FLASH</div>
        <div class="nav-item" onclick="setModo('combinados', this)"><span>🎲</span>DADOS</div>
        <div class="nav-item" onclick="setModo('ruleta', this)"><span>🎡</span>RULETA</div>
    </div>

<script>
    let nivel = 1, clicksNivel = 0, timerInterval, segundosPendientes = 0, rotation = 0, autoFlash = false;

    // MOTOR DE VOZ
    function hablar(texto) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(texto);
        u.lang = 'es-ES'; u.rate = 0.95;
        window.speechSynthesis.speak(u);
    }

    // TUS DATOS INTEGRALES
    const acciones = {
        fase1: [
            { t: "MASAJE CON LENGUA", p: "Fernanda boca abajo. Lame desde su nuca hasta el coxis, besos húmedos y soplos.", f: "Cierra los ojos y arquea la espalda lentamente.", s: 120 },
            { t: "SUCCIÓN DE PEZONES", p: "Succiona un pezón con suavidad mientras masajeas el otro. Muerde levemente.", f: "Cruza tus piernas sobre su espalda y mastúrbalo rítmicamente.", s: 180 },
            { t: "DEDOS EXPLORADORES (PUNTO G)", p: "Dos dedos palma arriba. Movimiento 'ven aquí' en zona rugosa superior.", f: "Aprieta tus músculos vaginales sobre sus dedos. Míralo.", s: 240 },
            { t: "MORDISCO EN MUSLOS", p: "Sujeta sus rodillas y ábrelas. Mordiscos firmes en cara interna.", f: "Agárrate de las sábanas y respira fuerte.", s: 120 },
            { t: "LENGUA MARIPOSA", p: "Punta de lengua en clítoris, movimientos rápidos como aleteo.", f: "Guía su cabeza. No cierres las piernas.", s: 150 }
        ],
        fase2: [
            { t: "PERRITO DE RODILLAS", p: "Detrás de ella. Penétrala con empujes largos al fondo.", f: "Apoya los codos, baja el pecho y sube el trasero.", s: 180 },
            { t: "MISIONERO ELEVADO", p: "Sobre ella. Tobillos al hombro para entrar profundo.", f: "Almohadas bajo cadera. Envuelve su cuello y gime en su oído.", s: 240 },
            { t: "LA SILLA CABALGANTE", p: "Sentado en el borde. Sujeta su cintura.", f: "Siéntate sobre él de frente. Usa tus pies para subir y bajar.", s: 180 },
            { t: "CUCHARITA PROFUNDA", p: "Ambos de lado. Entra por detrás despacio, acaricia su pecho.", f: "Empuja tu cadera hacia atrás rítmicamente.", s: 200 }
        ],
        fase3: [
            { t: "EL MOLINILLO", p: "Ella boca arriba. Sujeta sus nalgas y levántalas mientras entras con potencia.", f: "Apoya manos atrás. Rota tu cadera en círculos.", s: 300 },
            { t: "CLÍMAX LIBRE", p: "Elige la posición más excitante. Busca tu final con intensidad.", f: "No te guardes nada. Grita y disfruta con Paulo.", s: 600 }
        ]
    };

    const retos = [
        { t: "EL 69", p: "Boca arriba. Fernanda se coloca al revés.", f: "Tu cara en su entrepierna, tu sexo en su boca.", s: 180 },
        { t: "MISIONERO: TOBILLOS AL HOMBRO", p: "Sube sus pies a tus hombros para entrar más profundo.", f: "Levanta la pelvis para recibir cada embestida.", s: 150 },
        { t: "LA POSICIÓN 'W'", p: "Penétrala con sus rodillas dobladas hacia afuera al máximo.", f: "Piernas abiertas en W. Deja el camino libre.", s: 150 },
        { t: "LA FUSIÓN", p: "Siéntate con piernas cruzadas. Ella sobre tu regazo.", f: "Abrázalo por el cuello. Muévete subiendo y bajando.", s: 180 },
        { t: "VAQUERA EN CUCLILLAS", p: "Acostado. Manos en sus caderas para ayudarla.", f: "En cuclillas sobre él, subiendo y bajando rápido.", s: 150 },
        { t: "VAQUERA INVERTIDA", p: "Disfruta del espectáculo de su espalda.", f: "De espaldas a Paulo, inclina tu cuerpo adelante.", s: 150 },
        { t: "GARGANTA PROFUNDA (RETO)", p: "Quédate quieto. Deja que ella decida.", f: "Introduce su miembro lo más profundo posible.", s: 120 },
        { t: "RESISTENCIA (FERNANDA)", p: "Lame su clítoris con velocidad constante y frenética.", f: "Aguanta el placer sin moverte.", s: 120 },
        { t: "PAULO: COCINA EXTREMA", p: "Cárgala y siéntala en el mostrador. Dale con fuerza.", f: "Cruza tus piernas con fuerza en su espalda.", s: 60 },
        { t: "TRABALENGUAS PENETRADA", p: "Máximo ritmo en posición perrito.", f: "Di 'Tres tristes tigres' sin equivocarte.", s: 60 },
        { t: "TODO ADENTRO (ORDEÑO)", p: "Introduce todo y quédate inmóvil.", f: "Ordeñalo usando solo tus músculos internos.", s: 90 },
        { t: "NALGADAS RÍTMICAS", p: "Nalgada fuerte cada vez que entres al fondo.", f: "Cuenta las nalgadas en voz alta.", s: 150 },
        { t: "EL MUÑECO DE TRAPO", p: "Levántala contra la pared y penétrala sin tocar suelo.", f: "Sujétate de su cuello.", s: 120 },
        { t: "SUMISIÓN: BOCA ABAJO", p: "Boca abajo, nalgas arriba. 10 nalgadas y entra sin avisar.", f: "Cara contra almohada. Acepta su ritmo.", s: 180 },
        { t: "SILLA: EL CABALLITO", p: "Siéntate en silla firme.", f: "Siéntate mirando adelante y rebota con fuerza.", s: 150 },
        { t: "RESISTENCIA FINAL", p: "Velocidad máxima por 2 minutos sin detenerte.", f: "Piernas abiertas al máximo.", s: 120 }
    ];

    const castigosP = [{ t: "CASTIGO PAULO", p: "Solo lengua y labios. Círculos rápidos por 5 min. Manos atrás.", f: "Siéntate en su cara.", s: 300 }];
    const castigosF = [{ t: "CASTIGO FERNANDA", p: "Termina sobre su cara.", f: "No te limpies hasta que él lo diga.", s: 300 }];
    const intensidades = ["con fuerza bruta 😈", "con lentitud torturante 😏", "rápido y desesperado ⚡", "marcando el ritmo con nalgadas 🍑"];
    const lugaresFlash = ["en el sofá", "en el suelo", "en la mesa", "contra la pared", "en la cama"];

    function setModo(modo, el) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active'); autoFlash = false; resetTodo();
        const icon = document.getElementById('mode-icon');
        const ruleta = document.getElementById('ruleta-ui');
        const area = document.getElementById('action-area');
        icon.style.display = modo === 'ruleta' ? "none" : "flex";
        ruleta.style.display = modo === 'ruleta' ? "block" : "none";
        document.getElementById('fase-tag').innerText = "MODO: " + modo.toUpperCase();

        if(modo === 'flash') {
            area.innerHTML = '<button class="btn btn-flash" onclick="iniciarFlashAuto()">⚡ ACCIÓN FLASH CORRIDA</button>';
        } else if(modo === 'ruleta') {
            area.innerHTML = '<button class="btn btn-main" onclick="girarRuleta()">🎡 GIRAR RULETA</button>';
        } else {
            area.innerHTML = `<button class="btn btn-main" onclick="jugar('${modo}')">🔥 SIGUIENTE PASO</button>`;
        }
    }

    function resetTodo() { clearInterval(timerInterval); document.getElementById('timer').innerText = "00:00"; document.getElementById('btn-timer').style.display = "none"; document.getElementById('resultado').innerHTML = ""; }

    function jugar(modo) {
        resetTodo(); let item;
        if(modo === 'escalada') {
            let lista = nivel==1 ? acciones.fase1 : (nivel==2 ? acciones.fase2 : acciones.fase3);
            item = lista[Math.floor(Math.random()*lista.length)];
            clicksNivel++; if(clicksNivel>3){ nivel++; clicksNivel=0; }
        } else if(modo === 'desafio') {
            item = retos[Math.floor(Math.random()*retos.length)];
        } else if(modo === 'combinados') {
            const r = retos[Math.floor(Math.random()*retos.length)];
            item = { t: "DADO MIXTO", p: "Reto: " + r.t + ". " + intensidades[Math.floor(Math.random()*4)], f: r.f, s: 120 };
        }
        mostrar(item);
        hablar(item.t + ". Paulo: " + item.p);
    }

    function iniciarFlashAuto() { autoFlash = true; document.getElementById('action-area').innerHTML = '<button class="btn" style="background:#333" onclick="location.reload()">⏹️ DETENER</button>'; proximoFlash(); }

    function proximoFlash() {
        if(!autoFlash) return;
        resetTodo();
        const act = retos[Math.floor(Math.random()*retos.length)];
        const lug = lugaresFlash[Math.floor(Math.random()*lugaresFlash.length)];
        const int = intensidades[Math.floor(Math.random()*intensidades.length)];
        segundosPendientes = 25;

        document.getElementById('resultado').innerHTML = `<div class="card" style="border-color:red; background:#200">
            <h2 style="color:red; margin:0">⚡ FLASH ⚡</h2>
            <p style="font-size:18px; font-weight:bold;">${act.t.toUpperCase()}</p>
            <p style="color:var(--gold)">📍 LUGAR: ${lug.toUpperCase()}</p>
            <p style="font-size:13px;">🔥 MODO: ${int.toUpperCase()}</p>
        </div>`;
        hablar(act.t + " " + lug + " " + int + ". ¡Rápido!");
        activarReloj();
    }

    function girarRuleta() {
        resetTodo(); rotation += 1440 + Math.random()*360;
        document.getElementById('wheel').style.transform = `rotate(${rotation}deg)`;
        setTimeout(() => {
            let q = (rotation % 360 <= 180) ? "PAULO" : "FERNANDA";
            const c = q === "PAULO" ? castigosP[0] : castigosF[0];
            document.getElementById('resultado').innerHTML = `<div class="card" style="border-color:var(--pink)"><h2>CASTIGO ${q}</h2><p>${c.p}</p></div>`;
            hablar("Castigo para " + q + ". " + c.p);
        }, 3500);
    }

    function mostrar(item) {
        segundosPendientes = item.s;
        document.getElementById('resultado').innerHTML = `<div class="card">
            <h2 style="color:var(--accent); margin:0; font-size:18px;">${item.t}</h2>
            <p style="color:#5dade2; font-size:14px; margin:10px 0;"><b>♂ PAULO:</b> ${item.p}</p>
            <p style="color:#ec7063; font-size:14px; margin:0;"><b>♀ FERNANDA:</b> ${item.f}</p>
        </div>`;
        document.getElementById('btn-timer').style.display = "block";
    }

    function activarReloj() {
        document.getElementById('btn-timer').style.display = "none";
        let s = segundosPendientes;
        timerInterval = setInterval(() => {
            let m = Math.floor(s/60), r = s%60;
            document.getElementById('timer').innerText = `${m}:${r<10?'0':''}${r}`;
            if(s-- <= 0) {
                clearInterval(timerInterval);
                if(autoFlash) { hablar("Siguiente"); setTimeout(proximoFlash, 1500); }
                else { hablar("Tiempo terminado"); }
            }
        }, 1000);
    }

    setModo('escalada', document.querySelector('.nav-item'));
</script>
</body>
</html>
