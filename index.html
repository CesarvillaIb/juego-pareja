<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <style>
        :root { --accent: #00f2ff; --bg: #050505; --gold: #ffd700; --deep-red: #ff0033; --green: #2ecc71; --pink: #ff1493; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; padding-bottom: 50px; }
        .header { padding: 15px; background: #111; border-bottom: 2px solid var(--deep-red); }
        .mode-selector { display: flex; justify-content: center; gap: 5px; margin: 10px 0; }
        .mode-btn { padding: 10px; border: 1px solid #333; background: #000; color: #666; border-radius: 10px; font-size: 11px; cursor: pointer; flex: 1; max-width: 150px; }
        .mode-btn.active { border-color: var(--accent); color: white; box-shadow: 0 0 10px var(--accent); }
        
        .dice-container { margin: 20px auto; width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--accent); display: flex; align-items: center; justify-content: center; }
        #dice { font-size: 50px; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: inline-block; }

        /* NUEVA RULETA */
        #roulette-box { display: none; width: 140px; height: 140px; border-radius: 50%; border: 5px solid white; margin: 20px auto; position: relative; transition: transform 3s cubic-bezier(0.1, 0, 0.2, 1); background: conic-gradient(var(--pink) 0% 50%, #3498db 50% 100%); }
        .pointer { display: none; width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid white; margin: 0 auto; position: relative; z-index: 10; top: 10px; }

        .btn { width: 90%; max-width: 350px; padding: 20px; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; margin: 8px 0; transition: 0.3s; }
        .btn-main { background: linear-gradient(45deg, var(--deep-red), #8a2be2); }
        .btn-challenge { background: linear-gradient(45deg, #444, #111); border: 1px solid var(--gold); color: var(--gold); }
        .btn-punish { background: linear-gradient(45deg, #ff8c00, var(--pink)); border: 2px solid white; box-shadow: 0 0 15px var(--pink); }
        .btn-start { background: var(--green); display: none; box-shadow: 0 0 20px var(--green); margin-top: 10px; }
        
        #timer { font-size: 75px; font-weight: bold; margin: 10px 0; font-family: monospace; color: #fff; }
        #resultado { width: 92%; margin: 0 auto; }
        .card { background: #111; border-left: 5px solid var(--accent); padding: 20px; border-radius: 15px; text-align: left; margin-bottom: 15px; animation: slideIn 0.5s ease; }
        .card-t { font-size: 19px; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        .card-d { font-size: 14px; color: var(--gold); margin: 8px 0; font-style: italic; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .role-box { margin-top: 12px; font-size: 14px; line-height: 1.5; }
        .role-p { color: #3498db; margin-bottom: 12px; }
        .role-f { color: #e74c3c; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">

    <button id="btn-punish" class="btn btn-punish" onclick="girarRuleta()">🎡 RULETA DE CASTIGOS</button>
    
    <div id="timer">00:00</div>
    <button id="btn-iniciar-timer" class="btn btn-start" onclick="activarReloj()">▶️ EMPEZAR AHORA</button>

    <div id="resultado"></div>

            { t: "PAULO: COCINA EXTREMA", d: "Sexo en el mostrador.", p: "Paulo: Cárgala y siéntala en el mostrador de la cocina. Penétrala con fuerza bruta por un minuto entero.", f: "Fernanda: Cruza tus piernas con fuerza en su espalda para no caerte y disfruta el cambio de lugar.", s: 60 },
            { t: "TRABALENGUAS PENETRADA", d: "Mente vs Cuerpo.", p: "Paulo: Dale con tu máximo ritmo y fuerza en posición perrito.", f: "Fernanda: Di 'Tres tristes tigres' en voz alta sin equivocarte mientras sientes sus embestidas.", s: 60 },
            { t: "TODO ADENTRO (ORDEÑO)", d: "Succión vaginal.", p: "Paulo: Introduce todo tu miembro y quédate 100% inmóvil.", f: "Fernanda: Intenta 'ordeñar' su miembro usando solo tus músculos internos para apretarlo y tratar de sacarlo.", s: 90 },
            { t: "NALGADAS RÍTMICAS", d: "Estímulo sonoro y físico.", p: "Paulo: Da una nalgada fuerte cada vez que entres al fondo en posición de perrito.", f: "Fernanda: Cuenta las nalgadas en voz alta. Si pierdes la cuenta, Paulo te da 5 extras.", s: 150 },
            { t: "EL MUÑECO DE TRAPO", d: "Paulo toma el mando.", p: "Paulo: Levántala contra la pared y penétrala sin que sus pies toquen el suelo en ningún momento.", f: "Fernanda: Sujétate de su cuello. Debes mantenerte en el aire usando solo la fuerza de tus piernas sobre él.", s: 120 },
            { t: "SUMISIÓN: BOCA ABAJO", d: "Control total de Paulo.", p: "Paulo: Ponla boca abajo, nalgas arriba. Dale 10 nalgadas antes de entrar sin avisar.", f: "Fernanda: Mantén la cara contra la almohada. Acepta el ritmo que Paulo decida imponer.", s: 180 },

        const castigosP = [
            { t: "CASTIGO PAULO: ESCLAVO DEL CLÍTORIS", d: "Adoración total.", p: "Paulo: Solo lengua y labios. Círculos rápidos y firmes por 5 min. Manos atrás.", f: "Fernanda: Siéntate en su cara. Tú mandas el ritmo. Si para, nalgada.", s: 300 },
            { t: "CASTIGO PAULO: LA SILLA DE PLACER", d: "Servicio oral.", p: "Paulo: Arrodillado. Úsala oralmente con intensidad buscando su clímax.", f: "Fernanda: Sujétalo del cabello para marcar la velocidad.", s: 300 },
            { t: "CASTIGO PAULO: PENETRACIÓN DEDOS", d: "Punto G al límite.", p: "Paulo: 2 dedos palma arriba (ven aquí) rítmicamente sin parar.", f: "Fernanda: Tócate el clítoris mientras Paulo te penetra con dedos.", s: 300 }
        ];

        const castigosF = [
            { t: "CASTIGO FERNANDA: FINAL EN CARA", d: "Sometimiento.", p: "Paulo: Mastúrbate y termina sobre sus ojos y boca.", f: "Fernanda: De rodillas, manos atrás. No te limpies hasta que él lo diga.", s: 300 },

        function girarRuleta() {
            resetUI();
            document.getElementById('dice-box').style.display = "none";
            const wheel = document.getElementById('roulette-box');
            const pointer = document.getElementById('pointer');
            wheel.style.display = "block"; pointer.style.display = "block";

            const extraDeg = Math.floor(Math.random() * 360) + 1440;
            currentRotation += extraDeg;
            wheel.style.transform = `rotate(${currentRotation}deg)`;
            hablar("Girando ruleta de castigos");

            setTimeout(() => {
                const realDeg = currentRotation % 360;
                let quien = (realDeg <= 180) ? "FERNANDA" : "PAULO";
                hablar("Castigo para " + quien);
                let lista = (quien === "PAULO") ? castigosP : castigosF;
                mostrar(lista[Math.floor(Math.random() * lista.length)], '#ff1493');
            }, 3200);
        }

        function setModo(m) {
            document.getElementById('m-esc').className = 'mode-btn ' + (m=='escalada'?'active':'');
            document.getElementById('m-des').className = 'mode-btn ' + (m=='desafio'?'active':'');
            document.getElementById('btn-escalada').style.display = m=='escalada'?'inline-block':'none';
            document.getElementById('btn-desafio').style.display = m=='desafio'?'inline-block':'none';
            resetUI();
        }

        function resetUI() {
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = "00:00";
            document.getElementById('btn-iniciar-timer').style.display = "none";
            document.getElementById('resultado').innerHTML = "";
            document.getElementById('dice-box').style.display = "flex";
            document.getElementById('roulette-box').style.display = "none";
            document.getElementById('pointer').style.display = "none";
            document.getElementById('dice').style.transform = "rotate(0deg)";
        }

        function hablar(texto) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-ES';
            window.speechSynthesis.speak(msg);
        }

        function jugar() {
            clicksEnNivel++;
            if(clicksEnNivel > 4) { nivel++; clicksEnNivel = 0; } 
            let lista = nivel <= 2 ? acciones.fase1 : (nivel <= 4 ? acciones.fase2 : acciones.fase3);
            mostrar(lista[Math.floor(Math.random() * lista.length)], '#00f2ff');
            document.getElementById('fase-tag').innerText = "NIVEL " + (nivel > 3 ? 3 : nivel);
        }

        function lanzarReto() {
            mostrar(retos[Math.floor(Math.random() * retos.length)], '#ffd700');
        }

        function mostrar(item, color) {
            document.getElementById('dice').style.transform = "rotate(720deg)";
            segundosPendientes = item.s;
            setTimeout(() => {
                document.getElementById('resultado').innerHTML = `
                    <div class="card" style="border-color:${color}">
                        <div class="card-t">${item.t}</div>
                        ${item.d ? `<div class="card-d">${item.d}</div>` : ''}
                        <div class="role-box">
                            <div class="role-p"><b>♂ PAULO:</b> ${item.p}</div>
                            <div class="role-f"><b>♀ FERNANDA:</b> ${item.f}</div>
                        </div>
                    </div>
                `;
                hablar(item.t);
                document.getElementById('btn-iniciar-timer').style.display = "inline-block";
            }, 600);
        }

        function activarReloj() {
            document.getElementById('btn-iniciar-timer').style.display = "none";
            let s = segundosPendientes;
            hablar("¡Tiempo iniciado!");
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let m = Math.floor(s/60); let r = s%60;
                document.getElementById('timer').innerText = `${m}:${r<10?'0':''}${r}`;
                if(s-- <= 0) { 
                    clearInterval(timerInterval); 
                    hablar("¡Tiempo fuera!"); 
                }
            }, 1000);
        }
    </script>
</body>
</html>
