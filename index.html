<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Paulo & Fernanda 🔥</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
  text-align: center;
  padding: 15px;
}

h1 { font-size: 24px; }

button {
  margin: 10px;
  padding: 18px;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  background: #ff0033;
  color: white;
  width: 90%;
}

#dice {
  font-size: 70px;
  margin: 20px;
  transition: transform 0.5s;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  margin-top: 10px;
  border-radius: 15px;
}

#timer {
  font-size: 35px;
  margin-top: 15px;
  color: #ff4d6d;
}
</style>
</head>

<body>

<h1>🔥 Paulo & Fernanda 🔥</h1>

<div id="turno"></div>

<div id="dice">🎲</div>

<button onclick="tirar()">🎲 LANZAR</button>
<button onclick="modoExtremo()">😈 RETO / CASTIGO</button>

<div id="resultado"></div>
<div id="timer"></div>

<audio id="audio">
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
let turno = 1;
let nivel = 0;
let timerInterval;

const nombres = ["Paulo", "Fernanda"];

const acciones = [
  "Acércate lentamente 😏",
  "Mantén contacto cercano 🔥",
  "Provoca sin tocar 😈",
  "Guía el ritmo poco a poco",
  "Movimiento lento y constante"
];

const castigos = [
  "Obedeces sin decidir 😈",
  "No puedes hablar",
  "Tu pareja controla todo",
  "Mantén el ritmo sin parar",
  "Pierdes el control"
];

const tiempos = [60, 120, 180, 300];

function actualizarTurno() {
  document.getElementById("turno").innerText =
    "Turno: " + nombres[turno - 1];
}

function vibrar() {
  if (navigator.vibrate) {
    navigator.vibrate(200);
  }
}

function iniciarTimer(segundos) {
  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    let min = Math.floor(segundos / 60);
    let sec = segundos % 60;

    document.getElementById("timer").innerText =
      `${min}:${sec < 10 ? "0" : ""}${sec}`;

    if (segundos <= 0) {
      clearInterval(timerInterval);
      document.getElementById("timer").innerText = "🔥 CAMBIO 🔥";

      vibrar();
      speechSynthesis.speak(new SpeechSynthesisUtterance("Cambio"));
    }

    segundos--;
  }, 1000);
}

function tirar() {
  nivel++;

  const dice = document.getElementById("dice");
  dice.style.transform = "rotate(720deg)";

  const accion = acciones[Math.floor(Math.random()*acciones.length)];
  const tiempo = tiempos[Math.floor(Math.random()*tiempos.length)];

  document.getElementById("resultado").innerHTML = `
    <div class="card">🔥 ${accion}</div>
    <div class="card">⏱️ ${tiempo/60} min</div>
    <div class="card">Nivel: ${nivel}</div>
  `;

  document.getElementById("audio").play().catch(()=>{});

  vibrar();
  iniciarTimer(tiempo);

  turno = turno === 1 ? 2 : 1;
  actualizarTurno();
}

function modoExtremo() {
  const c = castigos[Math.floor(Math.random()*castigos.length)];

  document.getElementById("resultado").innerHTML += `
    <div class="card">😈 ${c}</div>
  `;

  vibrar();
}

actualizarTurno();
</script>

</body>
</html>
