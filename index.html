<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔥 P & F: Hardcore Pro 🔥</title>
    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #000000; 
            --gold: #ffd700; 
            --deep-red: #ff0033; 
            --green: #2ecc71; 
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: white; 
            text-align: center; 
            padding-bottom: 50px; 
            -webkit-tap-highlight-color: transparent;
        }

        .header { 
            padding: 20px; 
            background: #0a0a0a; 
            border-bottom: 2px solid var(--deep-red); 
            box-shadow: 0 4px 20px rgba(255, 0, 51, 0.2);
        }

        h1 { font-size: 22px; letter-spacing: 3px; margin: 0; font-weight: 900; }

        .mode-selector { display: flex; justify-content: center; gap: 8px; margin: 15px auto; width: 92%; }
        
        .mode-btn { 
            padding: 12px; border: 1px solid #333; background: #111; color: #666; 
            border-radius: 12px; font-size: 10px; font-weight: bold; cursor: pointer; flex: 1; 
            transition: 0.3s;
        }

        .mode-btn.active { border-color: var(--accent); color: white; box-shadow: 0 0 15px var(--accent); background: rgba(0, 242, 255, 0.1); }

        /* ESCENA DADOS 3D */
        .dice-scene { 
            display: flex; justify-content: center; gap: 40px; 
            perspective: 800px; margin: 25px 0; height: 70px; 
        }
        
        .cube {
            width: 60px; height: 60px; position: relative; transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.3, 1);
        }

        .face {
            position: absolute; width: 60px; height: 60px; background: #151515;
            border: 2px solid var(--accent); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 25px; color: var(--accent); box-shadow: inset 0 0 15px rgba(0,242,255,0.2);
        }

        /* Posiciones del Cubo */
        .front  { transform: rotateY(0deg) translateZ(30px); }
        .back   { transform: rotateY(180deg) translateZ(30px); }
        .right  { transform: rotateY(90deg) translateZ(30px); }
        .left   { transform: rotateY(-90deg) translateZ(30px); }
        .top    { transform: rotateX(90deg) translateZ(30px); }
        .bottom { transform: rotateX(-90deg) translateZ(30px); }

        /* BOTONES */
        .btn { 
            width: 90%; max-width: 380px; padding: 20px; border: none; 
            border-radius: 20px; font-size: 18px; font-weight: 900; color: white; 
            cursor: pointer; margin: 10px 0; transition: 0.3s; 
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-main { background: linear-gradient(45deg, var(--deep-red), #8a2be2); box-shadow: 0 6px 20px rgba(255, 0, 51, 0.3); }
        .btn-challenge { background: #111; border: 1px solid var(--gold); color: var(--gold); }

        /* Botón EMPEZAR PRO */
        .btn-start { 
            background: linear-gradient(45deg, #00c853, var(--green)); 
            color: #000; display: none; margin-top: 15px;
            animation: pulseGlow 1.5s infinite; 
            box-shadow: 0 0 20px var(--green);
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 0 10px var(--green); }
            50% { transform: scale(1.03); box-shadow: 0 0 30px var(--green); }
            100% { transform: scale(1); box-shadow: 0 0 10px var(--green); }
        }

        #timer { font-size: 85px; font-weight: bold; margin: 10px 0; font-family: monospace; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.2); }

        #resultado { width: 92%; margin: 20px auto; }

        .card { 
            background: #0f0f0f; border-left: 6px solid var(--accent); 
            padding: 25px; border-radius: 20px; text-align: left; 
            margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.5s ease;
        }

        .card-t { font-size: 20px; font-weight: 900; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
        .card-d { font-size: 15px; color: #999; margin-bottom: 15px; line-height: 1.4; font-style: italic; }
        
        .role-box { border-top: 1px solid #222; padding-top: 15px; }
        .role-p { color: #4dabff; margin-bottom: 12px; font-size: 15px; line-height: 1.4; }
        .role-f { color: #ff4d88; font-size: 15px; line-height: 1.4; }
        .role-box b { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; color: #fff; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>PAULO & FERNANDA</h1>
        <div class="mode-selector">
            <div id="m-esc" class="mode-btn active" onclick="setModo('escalada')">MODO ESCALADA</div>
            <div id="m-des" class="mode-btn" onclick="setModo('desafio')">10 RETOS FUERTES</div>
        </div>
        <div id="fase-tag" style="font-size: 11px; color: var(--accent); font-weight: bold; letter-spacing: 1px;">NIVEL 1: CALENTAMIENTO</div>
    </div>

    <div class="dice-scene">
        <div id="cube1" class="cube">
            <div class="face front">⚀</div><div class="face back">⚅</div>
            <div class="face right">⚁</div><div class="face left">⚄</div>
            <div class="face top">⚂</div><div class="face bottom">⚃</div>
        </div>
        <div id="cube2" class="cube">
            <div class="face front">⚀</div><div class="face back">⚅</div>
            <div class="face right">⚁</div><div class="face left">⚄</div>
            <div class="face top">⚂</div><div class="face bottom">⚃</div>
        </div>
    </div>

    <button id="btn-escalada" class="btn btn-main" onclick="jugar()">🔥 GIRAR DADOS</button>
    <button id="btn-desafio" class="btn btn-challenge" style="display:none;" onclick="lanzarReto()">😈 RETO EXTREMO</button>
    
    <div id="timer">00:00</div>
    <button id="btn-iniciar-timer" class="btn btn-start" onclick="activarReloj()">▶️ EMPEZAR RETO</button>

    <div id="resultado"></div>

    <script>
        let clicksEnNivel = 0;
        let nivel = 1;
        let timerInterval;
        let segundosPendientes = 0;

        const acciones = {
            fase1: [
                { t: "MASAJE CON LENGUA", p: "Lame desde su nuca hasta el coxis lentamente.", f: "Arquea la espalda y guía su cabeza.", s: 120 },
                { t: "SUCCIÓN DE PEZONES", p: "Succiona y muerde suavemente sus pezones.", f: "Masturba a Paulo con ritmo constante.", s: 180 },
                { t: "DEDOS EXPLORADORES", p: "Mete 3 dedos palma arriba y presiona el punto G.", f: "Aprieta tus músculos sobre sus dedos.", s: 240 },
                { t: "MORDISCO EN MUSLOS", p: "Da mordiscos firmes en la entrepierna de ella.", f: "Abre bien las piernas y míralo a los ojos.", s: 90 },
                { t: "ACICALAMIENTO", p: "Besa sus labios vaginales solo con la boca.", f: "Sostén su cabeza si quieres que se quede ahí.", s: 120 }
            ],
            fase2: [
                { t: "PERRITO DE RODILLAS", p: "Arrodillado erguido, empuja fuerte y profundo.", f: "Baja los codos, trasero lo más arriba posible.", s: 180 },
                { t: "MISIONERO ELEVADO", p: "Sujeta sus tobillos cerca de tus orejas al entrar.", f: "Pon almohadas bajo tu cadera y déjate llevar.", s: 240 },
                { t: "LA SILLA CABALGANTE", p: "Sentado, sujeta su cintura para marcar el ritmo.", f: "Sube y baja con todo tu peso sobre él.", s: 180 },
                { t: "CUCHARITA PROFUNDA", p: "Entra despacio pero llega al fondo cada vez.", f: "Empuja tu cadera hacia atrás para recibirlo todo.", s: 180 }
            ],
            fase3: [
                { t: "LA ARAÑA", p: "Sentado, balancéate de lado a lado dentro de ella.", f: "Cruza piernas en su espalda y aprieta fuerte.", s: 300 },
                { t: "EL MOLINILLO", p: "Sujeta sus nalgas y búscala con fuerza desde abajo.", f: "De espaldas sobre él, inclínate hasta tocar tus pies.", s: 300 },
                { t: "EL TRIÁNGULO", p: "Penetra con potencia máxima, pies de ella al hombro.", f: "Manos al suelo para equilibrio.", s: 200 },
                { t: "CLÍMAX LIBRE", p: "Termina con ella en la posición que quieras.", f: "Grita y disfruta el final.", s: 600 }
            ]
        };

        const retos = [
            { t: "GARGANTA PROFUNDA (PAULO RECIBE)", d: "Reto de resistencia oral extrema.", p: "No te muevas, deja que ella controle la profundidad.", f: "Mete TODO a la boca y aguanta la respiración lo más que puedas sin sacarlo.", s: 120 },
            { t: "RESISTENCIA (FERNANDA RECIBE)", d: "Reto de aguante sensorial.", p: "Lame su clítoris con mucha intensidad sin parar.", f: "Aguanta la respiración 15 segundos mientras él lo hace. Repite.", s: 120 },
            { t: "PAULO: COCINA EXTREMA", d: "Penetración en la cocina por 1 minuto.", p: "Cárgala contra el mostrador y métela por completo durante 60 segundos sin parar.", f: "Envuélvelo con tus piernas y aguanta el ritmo fuerte.", s: 60 },
            { t: "TRABALENGUAS PENETRADA", d: "Mente vs Placer.", p: "Penétrala lo más rápido y fuerte que puedas.", f: "Di 'Tres tristes tigres' sin equivocarte mientras él te da duro.", s: 60 },
            { t: "TODO ADENTRO (ORDEÑO)", d: "Control muscular interno.", p: "Mete todo y quédate inmóvil.", f: "Intenta sacarlo usando solo tus músculos internos.", s: 90 },
            { t: "NALGADAS RÍTMICAS", d: "Castigo y placer.", p: "Da una nalgada fuerte cada vez que entres al fondo.", f: "Cuenta las nalgadas en voz alta sin perder el hilo.", s: 150 },
            { t: "EL MUÑECO DE TRAPO", d: "Fuerza de Paulo.", p: "Levántala contra la pared y penétrala sin que ella toque el suelo.", f: "Sujétate de su cuello y aprieta con tus piernas.", s: 120 },
            { t: "SUMISIÓN: BOCA ABAJO", d: "Paulo toma el control total.", p: "Ponla boca abajo, nalgas arriba. 10 nalgadas antes de entrar.", f: "Mantente quieta y acepta el castigo.", s: 180 },
            { t: "SILLA: EL CABALLITO", d: "Reto en silla de cocina.", p: "Sentado en la silla. Deja que ella tome el control total.", f: "Siéntate sobre él de frente y bota con fuerza.", s: 150 },
            { t: "RESISTENCIA FINAL", d: "Velocidad máxima.", p: "Dale a máxima velocidad por 2 minutos.", f: "No puedes cerrar las piernas, mantenlas abiertas al máximo.", s: 120 }
        ];

        function setModo(m) {
            document.getElementById('m-esc').className = 'mode-btn ' + (m=='escalada'?'active':'');
            document.getElementById('m-des').className = 'mode-btn ' + (m=='desafio'?'active':'');
            document.getElementById('btn-escalada').style.display = m=='escalada'?'inline-block':'none';
            document.getElementById('btn-desafio').style.display = m=='desafio'?'inline-block':'none';
            resetUI();
        }

        function resetUI() {
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = "00:00";
            document.getElementById('btn-iniciar-timer').style.display = "none";
            document.getElementById('resultado').innerHTML = "";
        }

        function hablar(texto) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-ES';
            window.speechSynthesis.speak(msg);
        }

        function jugar() {
            clicksEnNivel++;
            if(clicksEnNivel > 4) { nivel++; clicksEnNivel = 0; } 
            let lista = nivel <= 2 ? acciones.fase1 : (nivel <= 4 ? acciones.fase2 : acciones.fase3);
            const item = lista[Math.floor(Math.random() * lista.length)];
            mostrar(item, '#00f2ff');
            document.getElementById('fase-tag').innerText = "NIVEL " + nivel;
        }

        function lanzarReto() {
            const item = retos[Math.floor(Math.random() * retos.length)];
            mostrar(item, '#ffd700');
        }

        function mostrar(item, color) {
            resetUI();
            
            // Animación Pro de Dados
            const c1 = document.getElementById('cube1');
            const c2 = document.getElementById('cube2');
            const rX = Math.floor(Math.random() * 4) * 90 + 720;
            const rY = Math.floor(Math.random() * 4) * 90 + 720;
            c1.style.transform = `rotateX(${rX}deg) rotateY(${rY}deg)`;
            c2.style.transform = `rotateX(${rY}deg) rotateY(${rX}deg)`;

            segundosPendientes = item.s;
            setTimeout(() => {
                document.getElementById('resultado').innerHTML = `
                    <div class="card" style="border-color:${color}">
                        <div class="card-t">${item.t}</div>
                        ${item.d ? `<div class="card-d">${item.d}</div>` : ''}
                        <div class="role-box">
                            <div class="role-p"><b>♂ PAULO</b> ${item.p}</div>
                            <div class="role-f"><b>♀ FERNANDA</b> ${item.f}</div>
                        </div>
                    </div>
                `;
                hablar(item.t);
                document.getElementById('btn-iniciar-timer').style.display = "inline-block";
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 1500);
        }

        function activarReloj() {
            document.getElementById('btn-iniciar-timer').style.display = "none";
            iniciarTimer(segundosPendientes);
            hablar("¡Tiempo en marcha!");
        }

        function iniciarTimer(s) {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let m = Math.floor(s/60); let r = s%60;
                document.getElementById('timer').innerText = `${m}:${r<10?'0':''}${r}`;
                if(s-- <= 0) { 
                    clearInterval(timerInterval); 
                    hablar("¡Tiempo fuera!"); 
                }
            }, 1000);
        }
    </script>
</body>
</html>
