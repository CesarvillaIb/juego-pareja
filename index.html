<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 P & F: Master Edition 🔥</title>
    <style>
        :root { --accent: #00f2ff; --bg: #050505; --gold: #ffd700; --deep-red: #ff0033; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; padding-bottom: 50px; }
        
        .header { padding: 15px; background: #111; border-bottom: 2px solid var(--deep-red); }
        .mode-selector { display: flex; justify-content: center; gap: 5px; margin: 10px 0; }
        .mode-btn { padding: 10px; border: 1px solid #333; background: #000; color: #666; border-radius: 10px; font-size: 11px; cursor: pointer; flex: 1; max-width: 150px; }
        .mode-btn.active { border-color: var(--accent); color: white; box-shadow: 0 0 10px var(--accent); }

        .dice-container { margin: 20px auto; width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--accent); display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        #dice { font-size: 50px; }

        .btn { width: 90%; max-width: 350px; padding: 20px; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; margin: 10px 0; }
        .btn-main { background: linear-gradient(45deg, var(--deep-red), #8a2be2); }
        .btn-challenge { background: linear-gradient(45deg, #444, #111); border: 1px solid var(--gold); color: var(--gold); }

        #timer { font-size: 70px; font-weight: bold; margin: 10px 0; font-family: monospace; color: #fff; }
        #resultado { width: 92%; margin: 0 auto; }
        
        .card { background: #111; border-left: 5px solid var(--accent); padding: 20px; border-radius: 15px; text-align: left; margin-bottom: 15px; }
        .card-t { font-size: 18px; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        .card-d { font-size: 15px; color: #ccc; margin-top: 10px; line-height: 1.4; }
        .kamasutra-tip { font-size: 13px; color: #888; border-top: 1px solid #222; margin-top: 10px; padding-top: 10px; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PAULO & FERNANDA</h1>
        <div class="mode-selector">
            <div id="m-esc" class="mode-btn active" onclick="setModo('escalada')">MODO ESCALADA</div>
            <div id="m-des" class="mode-btn" onclick="setModo('desafio')">RETOS SALVAJES</div>
        </div>
        <div id="fase-tag" style="font-size: 12px; color: var(--accent);">NIVEL 1: CALENTAMIENTO</div>
    </div>

    <div class="dice-container" id="dice-box"><div id="dice">🎲</div></div>

    <button id="btn-escalada" class="btn btn-main" onclick="jugar()">🔥 SIGUIENTE ACCIÓN</button>
    <button id="btn-desafio" class="btn btn-challenge" style="display:none;" onclick="lanzarReto()">😈 RETO EXTREMO</button>
    
    <div id="timer">00:00</div>
    <div id="resultado"></div>

    <script>
        let clicksEnNivel = 0;
        let nivel = 1;
        let timerInterval;
        const nombres = ["Paulo", "Fernanda"];

        const acciones = {
            fase1: [
                { t: "MASAJE CON LENGUA", d: "Paulo recorre la espalda de Fernanda con la punta de la lengua hasta llegar a su zona íntima.", s: 120 },
                { t: "SUCCIÓN DE PEZONES", d: "El que tenga el turno succiona fuerte mientras estimula el clítoris o pene con la mano.", s: 180 },
                { t: "DEDOS EXPLORADORES", d: "Introduce 3 dedos y busca el punto G con movimientos de 'ven aquí'. Ritmo rápido.", s: 300 },
                { t: "MORDISCO EN MUSLOS", d: "Muerde la parte interna de los muslos sin llegar a la penetración aún.", s: 60 },
                { t: "ACICALAMIENTO", d: "Usa solo los labios para besar cada centímetro de su zona genital.", s: 120 }
            ],
            fase2: [
                { t: "PERRITO DE RODILLAS", d: "Fernanda en 4, pero Paulo se mantiene de rodillas rectas para entrar más profundo.", s: 180, k: "Tip: Paulo, sujeta sus caderas y tira de ellas hacia ti mientras empujas." },
                { t: "EL MISIONERO ELEVADO", d: "Pon almohadas bajo la cadera de Fernanda. Paulo entra con las piernas de ella en su pecho.", s: 240, k: "Tip: Esto cambia el ángulo y permite rozar el punto G en cada entrada." },
                { t: "LA SILLA CABALGANTE", d: "Paulo sentado, Fernanda se sienta sobre él dándole la cara. Muévanse como si bailaran.", s: 180, k: "Tip: Fernanda, apóyate en sus hombros para subir y bajar con fuerza." },
                { t: "CUCHARITA PROFUNDA", d: "Ambos de lado, Paulo detrás de Fernanda. Penetra despacio pero hasta el fondo.", s: 180 }
            ],
            fase3: [
                { t: "LA ARAÑA (KAMASUTRA)", d: "Sentados frente a frente, piernas entrelazadas. Abrácense fuerte y rotas las caderas.", s: 300, k: "Tip: No es entrar y salir, es rotar y exprimir. Contacto total de piel." },
                { t: "EL MOLINILLO", d: "Fernanda sobre Paulo de espaldas, inclinada hacia adelante tocando sus pies.", s: 300, k: "Tip: Paulo, agarra sus nalgas y ayúdala a bajar con violencia." },
                { t: "EL TRIÁNGULO DE HIERRO", d: "Fernanda con manos en el suelo y pies al hombro de Paulo. Paulo de pie o rodillas.", s: 200, k: "Tip: La gravedad ayuda a que Paulo entre al máximo. ¡Dale duro!" },
                { t: "CLÍMAX LIBRE", d: "Elijan la que más les duela de placer y terminen ahora mismo.", s: 600 }
            ]
        };

        const retos = [
            { t: "RESISTENCIA ORAL (FERNANDA)", d: "Paulo recibe sexo oral. Fernanda debe meterse TODO a la boca y aguantar lo más posible sin sacarla.", s: 120 },
            { t: "RESISTENCIA ORAL (PAULO)", d: "Fernanda recibe. Paulo debe lamer intensamente mientras Fernanda aguanta la respiración por intervalos de 15 segundos.", s: 120 },
            { t: "MISIÓN: COCINA", d: "¡VAYAN A LA COCINA! Paulo la penetra contra el mostrador por 1 minuto exacto. ¡CORRAN!", s: 60 },
            { t: "EL TRABALENGUAS SUCIO", d: "Fernanda debe decir: 'Tres tristes tigres tragaban trigo' mientras Paulo la penetra lo más rápido que pueda.", s: 60 },
            { t: "DIME MI NOMBRE", d: "Paulo debe decir el nombre completo de Fernanda al revés mientras le da placer oral.", s: 45 },
            { t: "NALGADAS RÍTMICAS", d: "Paulo da una nalgada cada vez que entra. Cada vez más fuerte.", s: 120 },
            { t: "TODO ADENTRO", d: "Paulo mete todo y se queda inmóvil adentro. Fernanda debe intentar sacarlo solo usando sus músculos internos.", s: 90 }
        ];

        function setModo(m) {
            document.getElementById('m-esc').className = 'mode-btn ' + (m=='escalada'?'active':'');
            document.getElementById('m-des').className = 'mode-btn ' + (m=='desafio'?'active':'');
            document.getElementById('btn-escalada').style.display = m=='escalada'?'inline-block':'none';
            document.getElementById('btn-desafio').style.display = m=='desafio'?'inline-block':'none';
            document.getElementById('dice').innerText = m=='escalada'?'🎲':'😈';
        }

        function hablar(texto) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-ES';
            window.speechSynthesis.speak(msg);
        }

        function jugar() {
            clicksEnNivel++;
            if(clicksEnNivel > 2) { nivel++; clicksEnNivel = 0; } // Sube cada 3 acciones
            
            let lista = nivel <= 3 ? acciones.fase1 : (nivel <= 6 ? acciones.fase2 : acciones.fase3);
            const item = lista[Math.floor(Math.random() * lista.length)];
            
            mostrar(item, '#00f2ff');
            document.getElementById('fase-tag').innerText = "NIVEL " + nivel + (nivel < 4 ? ": CALOR" : ": ACCIÓN");
        }

        function lanzarReto() {
            const item = retos[Math.floor(Math.random() * retos.length)];
            mostrar(item, '#ffd700');
        }

        function mostrar(item, color) {
            document.getElementById('dice').style.transform = "rotate(360deg)";
            setTimeout(() => {
                document.getElementById('resultado').innerHTML = `
                    <div class="card" style="border-color:${color}">
                        <div class="card-t">${item.t}</div>
                        <div class="card-d">${item.d}</div>
                        ${item.k ? `<div class="kamasutra-tip"><b>Kamasutra:</b> ${item.k}</div>` : ''}
                    </div>
                `;
                hablar(item.t);
                iniciarTimer(item.s);
                document.getElementById('dice').style.transform = "rotate(0deg)";
            }, 300);
        }

        function iniciarTimer(s) {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let m = Math.floor(s/60); let r = s%60;
                document.getElementById('timer').innerText = `${m}:${r<10?'0':''}${r}`;
                if(s-- <= 0) { clearInterval(timerInterval); hablar("Tiempo fuera. ¿Siguen vivos?"); }
            }, 1000);
        }
    </script>
</body>
</html>
