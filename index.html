<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Paulo & Fernanda: Fuego Inmediato 🔥</title>
    <style>
        :root {
            --primary: #ff0033;
            --climax: #8a2be2;
            --bg: #030303; /* Aún más oscuro */
        }
        body {
            margin: 0; font-family: 'Helvetica Neue', sans-serif;
            background: var(--bg); color: white; text-align: center;
            padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px rgba(255,0,51,0.7); }
        #nivel-display { font-size: 18px; color: #ffcccc; margin-bottom: 5px; font-weight: bold; }
        #turno { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #fff; }
        
        .btn {
            margin: 10px; padding: 20px; font-size: 18px; font-weight: bold;
            border: none; border-radius: 50px; color: white; width: 90%; max-width: 350px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-lanzar { background: linear-gradient(45deg, #ff0033, #8a2be2); box-shadow: 0 0 25px rgba(255,0,51,0.6); }
        .btn-extremo { background: linear-gradient(45deg, #4a00e0, #1a1a1a); margin-top: 5px; border: 1px solid #4a00e0; }
        
        #dice { font-size: 80px; margin: 15px; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: drop-shadow(0 0 10px var(--primary)); }
        
        .card {
            background: rgba(10, 10, 10, 0.95); border: 2px solid #333;
            padding: 20px; margin-top: 15px; border-radius: 20px;
            width: 85%; max-width: 350px; animation: slideIn 0.4s ease-out;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }
        .card-titulo { font-size: 14px; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        .card-texto { font-size: 22px; font-weight: 600; line-height: 1.3; color: #fff; }

        #timer { font-size: 55px; font-weight: bold; margin-top: 25px; color: var(--primary); text-shadow: 0 0 15px rgba(255,0,51,0.8); font-variant-numeric: tabular-nums; }

        @keyframes slideIn { from { opacity: 0; transform: scale(0.8) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body>

    <h1>🔥 P & F 🔥</h1>
    <div id="nivel-display">Fase: Fuego Inicial</div>
    <div id="turno">Cargando...</div>
    
    <div id="dice">🎲</div>

    <button class="btn btn-lanzar" onclick="tirar()">🎲 SUBIR LA TEMPERATURA</button>
    <button class="btn btn-extremo" onclick="modoExtremo()">😈 RETO SUCIO</button>

    <div id="resultado"></div>
    <div id="timer">00:00</div>

    <script>
        let turno = 0;
        let nivel = 1;
        let timerInterval;
        let rotation = 0;
        const nombres = ["Paulo", "Fernanda"];

        // Fases de intensidad REAJUSTADAS (Más fuertes desde el inicio)
        const fases = {
            fuegoInicial: [ // Niveles 1-3: Contacto físico directo y lascivo
                "Beso francés profundo y agresivo durante 1 minuto",
                "Muerde y lame el cuello de tu pareja dejando marca",
                "Usa tus manos para explorar intensamente *bajo la ropa* de tu pareja",
                "Susurra la cosa más sucia que quieres hacerle *ahora mismo*"
            ],
            calorIntermedio: [ // Niveles 4-6: Semidesnudez y contacto genital
                "Quítale la ropa interior a tu pareja... usando solo los dientes",
                "Frótate intensamente contra los genitales de tu pareja (con o sin ropa)",
                "Pega tu cuerpo al de tu pareja y acaricia su zona más íntima",
                "Recorre con tu lengua el cuerpo de tu pareja hasta llegar a su entrepierna"
            ],
            climaxTotal: [ // Niveles 7+: Sexo explícito y posiciones
                "Posición de 'La Araña': Paulo abajo, Fernanda arriba. ¡A disfrutar! 🔥",
                "Sexo oral intenso e ininterrumpido hasta que el timer termine",
                "Perrito salvaje: Controla el ritmo y haz que tu pareja grite",
                "Elige tu posición favorita y haz que tu pareja llegue al clímax"
            ]
        };

        const castigos = [
            "Venda en los ojos: Solo puedes sentir cómo te tocan",
            "Manos atadas a la espalda: No puedes usarlas para tocar",
            "Sumisión total: Obedece *cualquier* orden de tu pareja ahora",
            "Sin censura: Toca a tu pareja donde quieras, como quieras"
        ];

        function actualizarTurno() {
            document.getElementById("turno").innerText = "Turno: " + nombres[turno];
            let faseNombre = "Fuego Inicial 🔥";
            let faseColor = "#ffcccc";
            if(nivel > 3) { faseNombre = "Calor Intermedio 😈"; faseColor = "#ff4d6d"; }
            if(nivel > 6) { faseNombre = "CLÍMAX TOTAL 💦"; faseColor = var(--climax); }
            
            const nivelDisp = document.getElementById("nivel-display");
            nivelDisp.innerText = faseNombre;
            nivelDisp.style.color = faseColor;
        }

        function iniciarTimer(segundos) {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let min = Math.floor(segundos / 60);
                let sec = segundos % 60;
                document.getElementById("timer").innerText = `${min}:${sec < 10 ? "0" : ""}${sec}`;
                if (segundos <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById("timer").innerText = "💦 CAMBIO 💦";
                    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
                }
                segundos--;
            }, 1000);
        }

        function tirar() {
            rotation += 720; // Giro más rápido
            const dice = document.getElementById("dice");
            dice.style.transform = `rotate(${rotation}deg)`;

            let listaActual;
            if (nivel <= 3) listaActual = fases.fuegoInicial;
            else if (nivel <= 6) listaActual = fases.calorIntermedio;
            else listaActual = fases.climaxTotal;

            const accion = listaActual[Math.floor(Math.random() * listaActual.length)];
            
            // Tiempos más largos para disfrutar
            let tiempo = 120; // 2 min inicial
            if (nivel > 3) tiempo = 180; // 3 min intermedio
            if (nivel > 6) tiempo = 600; // 10 min clímax

            document.getElementById("resultado").innerHTML = `
                <div class="card">
                    <div class="card-titulo">ACCIÓN NIVEL ${nivel}</div>
                    <div class="card-texto">${accion}</div>
                </div>
            `;

            iniciarTimer(tiempo);
            nivel++;
            turno = (turno === 0) ? 1 : 0;
            actualizarTurno();
        }

        function modoExtremo() {
            const c = castigos[Math.floor(Math.random() * castigos.length)];
            document.getElementById("resultado").innerHTML += `
                <div class="card" style="border-color: var(--climax); box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);">
                    <div class="card-titulo" style="color: var(--climax)">RETO SUCIO</div>
                    <div class="card-texto">${c}</div>
                </div>
            `;
            if (navigator.vibrate) navigator.vibrate(500); // Vibración larga para reto
        }

        actualizarTurno();
    </script>
</body>
</html>
