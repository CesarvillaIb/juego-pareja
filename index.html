<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P & F: PRO INTERFACE</title>
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #000000;
            --gold: #ffd700;
            --deep-red: #ff0033;
            --neon-green: #39ff14;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: white;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        /* UI PRO ELEMENTS */
        .top-bar { width: 100%; padding: 20px 0; background: #0a0a0a; border-bottom: 1px solid #222; text-align: center; }
        .top-bar h1 { font-size: 18px; letter-spacing: 5px; margin: 0; font-weight: 300; color: #fff; }

        .selector { display: flex; gap: 10px; margin: 20px; width: 92%; }
        .mode-btn { 
            flex: 1; padding: 15px 5px; background: #111; border: 1px solid #333; 
            color: #666; border-radius: 15px; font-size: 11px; font-weight: bold; transition: 0.4s;
        }
        .mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0, 242, 255, 0.05); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }

        /* ESCENA DADOS 3D PRO */
        .dice-scene { display: flex; gap: 45px; perspective: 1000px; margin: 35px 0; height: 80px; }
        .cube {
            width: 70px; height: 70px; position: relative; transform-style: preserve-3d;
            transition: transform 1.8s cubic-bezier(0.2, 0.8, 0.3, 1);
        }
        .face {
            position: absolute; width: 70px; height: 70px; background: #151515;
            border: 2.5px solid var(--accent); border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: var(--accent); box-shadow: inset 0 0 20px rgba(0,242,255,0.15);
        }
        .front  { transform: rotateY(0deg) translateZ(35px); }
        .back   { transform: rotateY(180deg) translateZ(35px); }
        .right  { transform: rotateY(90deg) translateZ(35px); }
        .left   { transform: rotateY(-90deg) translateZ(35px); }
        .top    { transform: rotateX(90deg) translateZ(35px); }
        .bottom { transform: rotateX(-90deg) translateZ(35px); }

        /* BUTTONS */
        .main-button {
            width: 88%; padding: 22px; border-radius: 20px; border: none;
            font-size: 17px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; transition: 0.3s; margin-bottom: 10px;
        }
        .btn-roll { background: #fff; color: #000; box-shadow: 0 10px 25px rgba(255,255,255,0.1); }
        .btn-roll:active { transform: scale(0.96); }

        #timer { font-size: 75px; font-weight: 100; margin: 10px 0; color: #fff; font-family: 'Courier New', monospace; }

        .btn-start { 
            background: transparent; border: 2px solid var(--neon-green); color: var(--neon-green);
            display: none; animation: pulseGlow 1.5s infinite;
        }

        @keyframes pulseGlow { 
            0% { box-shadow: 0 0 5px var(--neon-green); transform: scale(1); }
            50% { box-shadow: 0 0 30px var(--neon-green); transform: scale(1.02); }
            100% { box-shadow: 0 0 5px var(--neon-green); transform: scale(1); }
        }

        /* RESULT CARD GLASS */
        #resultado { width: 92%; margin-bottom: 30px; }
        .card {
            background: var(--glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 25px;
            padding: 30px; text-align: left; animation: slideUp 0.7s ease-out;
        }
        .card-t { color: var(--accent); font-size: 20px; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .role { margin: 15px 0; font-size: 15px; line-height: 1.5; border-left: 3px solid #333; padding-left: 15px; }
        .p-txt { border-color: #3498db; }
        .f-txt { border-color: #e74c3c; }
        .role b { display: block; font-size: 11px; margin-bottom: 4px; color: #888; letter-spacing: 1px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="top-bar"><h1>PAULO & FERNANDA</h1></div>

<div class="selector">
    <button id="m-esc" class="mode-btn active" onclick="cambiarModo('escalada')">MODO ESCALADA</button>
    <button id="m-des" class="mode-btn" onclick="cambiarModo('desafio')">10 RETOS FUERTES</button>
</div>

<div class="dice-scene">
    <div id="cube1" class="cube">
        <div class="face front">⚀</div><div class="face back">⚅</div>
        <div class="face right">⚁</div><div class="face left">⚄</div>
        <div class="face top">⚂</div><div class="face bottom">⚃</div>
    </div>
    <div id="cube2" class="cube">
        <div class="face front">⚀</div><div class="face back">⚅</div>
        <div class="face right">⚁</div><div class="face left">⚄</div>
        <div class="face top">⚂</div><div class="face bottom">⚃</div>
    </div>
</div>

<button class="main-button btn-roll" onclick="lanzarDados()">GIRAR DADOS</button>
<div id="timer">00:00</div>
<button id="btn-start" class="main-button btn-start" onclick="iniciarConteo()">⚡ EMPEZAR AHORA</button>

<div id="resultado"></div>

<script>
    let nivel = 1; let clicks = 0; let sPendientes = 0; let timerInterval;

    const acciones = {
        fase1: [
            { t: "MASAJE CON LENGUA", p: "Lame desde su nuca hasta el coxis lentamente.", f: "Arquea la espalda y guía su cabeza.", s: 120 },
            { t: "SUCCIÓN DE PEZONES", p: "Succiona y muerde suavemente sus pezones.", f: "Masturba a Paulo con ritmo constante.", s: 180 },
            { t: "DEDOS EXPLORADORES", p: "Mete 3 dedos palma arriba y presiona el punto G.", f: "Aprieta tus músculos sobre sus dedos.", s: 240 },
            { t: "MORDISCO EN MUSLOS", p: "Da mordiscos firmes en la entrepierna de ella.", f: "Abre bien las piernas y míralo a los ojos.", s: 90 },
            { t: "ACICALAMIENTO", p: "Besa sus labios vaginales solo con la boca.", f: "Sostén su cabeza si quieres que se quede ahí.", s: 120 }
        ],
        fase2: [
            { t: "PERRITO DE RODILLAS", p: "Arrodillado erguido, empuja fuerte y profundo.", f: "Baja los codos, trasero lo más arriba posible.", s: 180 },
            { t: "MISIONERO ELEVADO", p: "Sujeta sus tobillos cerca de tus orejas al entrar.", f: "Pon almohadas bajo tu cadera y déjate llevar.", s: 240 },
            { t: "LA SILLA CABALGANTE", p: "Sentado, sujeta su cintura para marcar el ritmo.", f: "Sube y baja con todo tu peso sobre él.", s: 180 },
            { t: "CUCHARITA PROFUNDA", p: "Entra despacio pero llega al fondo cada vez.", f: "Empuja tu cadera hacia atrás para recibirlo todo.", s: 180 }
        ],
        fase3: [
            { t: "LA ARAÑA", p: "Sentado, balancéate de lado a lado dentro de ella.", f: "Cruza piernas en su espalda y aprieta fuerte.", s: 300 },
            { t: "EL MOLINILLO", p: "Sujeta sus nalgas y búscala con fuerza desde abajo.", f: "De espaldas sobre él, inclínate hasta tocar tus pies.", s: 300 },
            { t: "EL TRIÁNGULO", p: "Penetra con potencia máxima, pies de ella al hombro.", f: "Manos al suelo para equilibrio.", s: 200 },
            { t: "CLÍMAX LIBRE", p: "Termina con ella en la posición que quieras.", f: "Grita y disfruta el final.", s: 600 }
        ]
    };

    const retos = [
        { t: "GARGANTA PROFUNDA (PAULO RECIBE)", p: "No te muevas, deja que ella controle la profundidad.", f: "Mete TODO a la boca y aguanta la respiración lo más que puedas sin sacarlo.", s: 120 },
        { t: "RESISTENCIA (FERNANDA RECIBE)", p: "Lame su clítoris con mucha intensidad sin parar.", f: "Aguanta la respiración 15 segundos mientras él lo hace. Repite.", s: 120 },
        { t: "PAULO: COCINA EXTREMA", p: "Cárgala contra el mostrador y dale fuerte 60 seg.", f: "Envuélvelo con tus piernas y aguanta el ritmo.", s: 60 },
        { t: "TRABALENGUAS PENETRADA", p: "Penétrala lo más rápido y fuerte que puedas.", f: "Di 'Tres tristes tigres' sin equivocarte.", s: 60 },
        { t: "TODO ADENTRO (ORDEÑO)", p: "Mete todo y quédate inmóvil.", f: "Intenta sacarlo usando solo tus músculos.", s: 90 },
        { t: "NALGADAS RÍTMICAS", p: "Da una nalgada fuerte en cada embestida profunda.", f: "Cuenta las nalgadas en voz alta.", s: 150 },
        { t: "EL MUÑECO DE TRAPO", p: "Levántala contra la pared y penétrala en el aire.", f: "Sujétate de su cuello y no toques el suelo.", s: 120 },
        { t: "SUMISIÓN: BOCA ABAJO", p: "Ponla boca abajo. 10 nalgadas antes de entrar.", f: "Mantente quieta y acepta el castigo.", s: 180 },
        { t: "SILLA: EL CABALLITO", p: "Siéntate en la silla. Deja que ella tome el control.", f: "Siéntate sobre él de frente y bota con fuerza.", s: 150 },
        { t: "RESISTENCIA FINAL", p: "Dale a máxima velocidad por 2 minutos.", f: "Mantenlas piernas abiertas al máximo.", s: 120 }
    ];

    function cambiarModo(m) {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        resetUI();
    }

    function resetUI() {
        clearInterval(timerInterval);
        document.getElementById('timer').innerText = "00:00";
        document.getElementById('btn-start').style.display = "none";
        document.getElementById('resultado').innerHTML = "";
    }

    function lanzarDados() {
        resetUI();
        const c1 = document.getElementById('cube1');
        const c2 = document.getElementById('cube2');
        
        const rX = Math.floor(Math.random() * 5) * 90 + 720;
        const rY = Math.floor(Math.random() * 5) * 90 + 720;
        c1.style.transform = `rotateX(${rX}deg) rotateY(${rY}deg)`;
        c2.style.transform = `rotateX(${rY}deg) rotateY(${rX}deg)`;

        setTimeout(() => {
            let modo = document.getElementById('m-esc').classList.contains('active') ? 'esc' : 'des';
            let item;
            if(modo === 'esc') {
                clicks++; if(clicks > 4) { nivel++; clicks = 0; }
                let lista = nivel <= 2 ? acciones.fase1 : (nivel <= 4 ? acciones.fase2 : acciones.fase3);
                item = lista[Math.floor(Math.random() * lista.length)];
            } else {
                item = retos[Math.floor(Math.random() * retos.length)];
            }
            mostrarResultado(item);
        }, 1800);
    }

    function mostrarResultado(item) {
        sPendientes = item.s;
        document.getElementById('resultado').innerHTML = `
            <div class="card">
                <div class="card-t">${item.t}</div>
                <div class="role p-txt"><b>♂ PAULO</b>${item.p}</div>
                <div class="role f-txt"><b>♀ FERNANDA</b>${item.f}</div>
            </div>
        `;
        document.getElementById('btn-start').style.display = "block";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function iniciarConteo() {
        document.getElementById('btn-start').style.display = "none";
        let s = sPendientes;
        timerInterval = setInterval(() => {
            let m = Math.floor(s/60); let r = s%60;
            document.getElementById('timer').innerText = `${m}:${r<10?'0':''}${r}`;
            if(s-- <= 0) { 
                clearInterval(timerInterval); 
                document.getElementById('timer').innerText = "DONE"; 
            }
        }, 1000);
    }
</script>
</body>
</html>
