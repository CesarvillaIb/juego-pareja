<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 P & F: Escalada Salvaje 🔥</title>
    <style>
        :root { --red: #ff0033; --purple: #8a2be2; --bg: #000; }
        body { margin: 0; font-family: 'Arial Black', sans-serif; background: var(--bg); color: white; text-align: center; padding: 10px; }
        h1 { color: var(--red); font-size: 22px; text-shadow: 0 0 10px var(--red); margin: 10px 0; }
        #fase-info { font-size: 14px; color: #ff99aa; text-transform: uppercase; letter-spacing: 2px; }
        #turno { font-size: 20px; margin: 5px 0; color: #fff; }
        
        .btn { margin: 5px; padding: 18px; font-size: 18px; font-weight: bold; border: none; border-radius: 50px; color: white; width: 95%; max-width: 350px; cursor: pointer; transition: 0.3s; }
        .btn-fire { background: linear-gradient(45deg, var(--red), var(--purple)); box-shadow: 0 0 20px rgba(255,0,51,0.4); }
        .btn-dark { background: #111; border: 1px solid #444; font-size: 13px; padding: 10px; color: #888; }
        
        #dice { font-size: 50px; margin: 10px; display: inline-block; transition: transform 0.6s; }
        
        .card { background: #0a0a0a; border: 2px solid #222; padding: 15px; margin-top: 10px; border-radius: 20px; text-align: left; animation: slideUp 0.4s ease; }
        .card-t { font-size: 11px; color: var(--red); font-weight: bold; margin-bottom: 5px; }
        .card-x { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 8px; }
        .card-desc { font-size: 14px; color: #bbb; line-height: 1.4; border-top: 1px solid #222; padding-top: 8px; }
        
        #timer { font-size: 70px; font-weight: bold; margin-top: 10px; color: var(--red); font-family: 'Courier New', monospace; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="fase-info">FASE 1: PREPARACIÓN</div>
    <h1>🔥 PAULO & FERNANDA 🔥</h1>
    <div id="turno">Turno: Paulo</div>
    
    <div id="dice">🎲</div>

    <button class="btn btn-fire" onclick="tirar()">🔥 SUBIR NIVEL</button>
    <button class="btn btn-dark" onclick="modoExtremo()">😈 RETO SUCIO</button>

    <div id="resultado"></div>
    <div id="timer">00:00</div>

    <script>
        let turno = 0;
        let nivel = 1;
        let timerInterval;
        const nombres = ["Paulo", "Fernanda"];

        // BASE DE DATOS POR NIVELES
        const fases = {
            baja: [ // Nivel 1-3
                { t: "BESO FRANCÉS AGRESIVO", d: "Sin usar las manos, solo lenguas y mordiscos en los labios. Siéntense frente a frente.", s: 60 },
                { t: "ORAL DE BIENVENIDA", d: "El que tiene el turno da placer oral al otro intensamente. Sin distracciones.", s: 120 },
                { t: "EXPLORACIÓN MANUAL", d: "Mete los dedos en la vagina de Fernanda (o estimula a Paulo) con fuerza y ritmo rápido.", s: 180 }
            ],
            media: [ // Nivel 4-6
                { t: "MISIONERO PIERNAS AL HOMBRO", d: "Fernanda boca arriba con piernas en los hombros de Paulo para una penetración profunda.", s: 180 },
                { t: "EL PERRITO (RITMO FUERTE)", d: "Paulo toma a Fernanda por las caderas. Dale duro y constante. No te detengas.", s: 120 },
                { t: "69 SALVAJE", d: "Placer mutuo. Concéntrense en la lengua y la succión. Ritmo frenético.", s: 120 }
            ],
            alta: [ // Nivel 7+
                { t: "LA ARAÑA (KAMASUTRA)", d: "Sentados frente a frente entrelazados. Movimientos circulares y profundos. Besos constantes.", s: 300 },
                { t: "EL MOLINILLO EXTREMO", d: "Fernanda sobre Paulo, de espaldas a él. Ella marca el ritmo bajando con fuerza.", s: 300 },
                { t: "CONTRA LA PARED", d: "Paulo carga a Fernanda o la apoya contra la pared. Penetración salvaje y rápida.", s: 120 },
                { t: "CLÍMAX LIBRE", d: "Elijan su posición favorita y terminen con todo. No hay reglas.", s: 600 }
            ]
        };

        function hablar(texto) {
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-ES';
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }

        function actualizarUI() {
            document.getElementById("turno").innerText = "Turno: " + nombres[turno];
            let faseTexto = "FASE 1: CALENTAMIENTO";
            if(nivel > 3) faseTexto = "FASE 2: ACCIÓN POSICIONES";
            if(nivel > 6) faseTexto = "FASE 3: CLÍMAX TOTAL";
            document.getElementById("fase-info").innerText = faseTexto;
        }

        function iniciarTimer(segundos) {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let min = Math.floor(segundos / 60);
                let sec = segundos % 60;
                document.getElementById("timer").innerText = `${min}:${sec < 10 ? "0" : ""}${sec}`;
                if (segundos <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById("timer").innerText = "💦 SIGUIENTE 💦";
                    hablar("Tiempo terminado. Siguiente nivel.");
                    if (navigator.vibrate) navigator.vibrate([400, 100, 400]);
                }
                segundos--;
            }, 1000);
        }

        function tirar() {
            const dice = document.getElementById("dice");
            dice.style.transform = `rotate(${nivel * 360}deg)`;

            let lista;
            if (nivel <= 3) lista = fases.baja;
            else if (nivel <= 6) lista = fases.media;
            else lista = fases.alta;

            const item = lista[Math.floor(Math.random() * lista.length)];

            document.getElementById("resultado").innerHTML = `
                <div class="card">
                    <div class="card-t">NIVEL DE INTENSIDAD: ${nivel}</div>
                    <div class="card-x">${item.t}</div>
                    <div class="card-desc"><strong>INSTRUCCIÓN:</strong> ${item.d}</div>
                </div>
            `;

            iniciarTimer(item.s);
            nivel++;
            turno = (turno === 0) ? 1 : 0;
            actualizarUI();
        }

        function modoExtremo() {
            const retos = [
                "¡NALGADA FUERTE! Paulo castiga a Fernanda ahora.",
                "¡GRITA MI NOMBRE! Fernanda debe gritar el nombre de Paulo mientras lo hacen.",
                "¡SIN MANOS! Solo puedes usar la boca por este turno.",
                "¡DEDOS EXTRA! Paulo usa su mano libre para jugar con el clítoris."
            ];
            const r = retos[Math.floor(Math.random() * retos.length)];
            document.getElementById("resultado").innerHTML += `<div class="card" style="border-color: var(--purple)"><div class="card-x">😈 ${r}</div></div>`;
            hablar("Reto sucio");
        }

        actualizarUI();
    </script>
</body>
</html>
