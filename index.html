<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔥 P & F: Ultra Hardcore 🔥</title>
    <style>
        :root { 
            --accent: #00f2ff; --bg: #050505; --gold: #ffd700; 
            --deep-red: #ff0033; --green: #00ff88; --glass: rgba(255, 255, 255, 0.07);
        }

        body { 
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); color: white; text-align: center; 
            padding-bottom: 50px; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        .header { padding: 20px 10px; background: #111; border-bottom: 2px solid var(--deep-red); }
        h1 { font-size: 24px; letter-spacing: 2px; margin: 0; }

        .mode-selector { display: flex; justify-content: center; gap: 8px; margin: 15px auto; max-width: 95%; }
        .mode-btn { 
            padding: 12px 5px; border: 1px solid #333; background: #000; color: #666; 
            border-radius: 12px; font-size: 11px; font-weight: bold; cursor: pointer; flex: 1; 
        }
        .mode-btn.active { border-color: var(--accent); color: white; box-shadow: 0 0 15px var(--accent); background: rgba(0, 242, 255, 0.1); }

        /* Doble Dado Interface */
        .dice-area { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .dice { 
            font-size: 50px; width: 75px; height: 75px; background: var(--glass); 
            border-radius: 18px; display: flex; align-items: center; justify-content: center; 
            border: 2px solid var(--accent); transition: 0.5s;
        }
        .rolling { animation: shake 0.3s infinite; }

        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            50% { transform: translate(-2px, -2px) rotate(10deg); }
            100% { transform: translate(2px, 2px) rotate(0deg); }
        }

        /* Botones Principales */
        .btn { width: 90%; max-width: 350px; padding: 20px; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; margin: 10px 0; transition: 0.3s; }
        .btn-main { background: linear-gradient(45deg, var(--deep-red), #8a2be2); box-shadow: 0 5px 15px rgba(255, 0, 51, 0.3); }
        .btn-challenge { background: linear-gradient(45deg, #444, #111); border: 1px solid var(--gold); color: var(--gold); }
        
        /* Botón EMPEZAR Mejorado */
        .btn-start { 
            background: linear-gradient(45deg, #00c853, var(--green)); color: #000; 
            display: none; animation: pulseGlow 1.5s infinite; box-shadow: 0 0 20px var(--green);
            text-transform: uppercase; letter-spacing: 1px;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #timer { font-size: 80px; font-weight: bold; margin: 10px 0; font-family: monospace; text-shadow: 0 0 15px var(--deep-red); }
        #resultado { width: 92%; margin: 20px auto; }
        
        /* Tarjeta de Actividad */
        .card { 
            background: #111; border-radius: 20px; padding: 25px; text-align: left; 
            border-left: 6px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.5s ease;
        }
        .card-t { font-size: 20px; font-weight: bold; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
        .card-d { font-size: 15px; color: #ccc; margin-bottom: 15px; line-height: 1.4; }
        .role-box { border-top: 1px solid #222; padding-top: 15px; }
        .role { margin-bottom: 10px; font-size: 14px; }
        .role b { display: block; font-size: 11px; text-transform: uppercase; margin-bottom: 3px; }
        .p-color { color: #3498db; }
        .f-color { color: #e74c3c; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>PAULO & FERNANDA</h1>
        <div class="mode-selector">
            <div id="m-esc" class="mode-btn active" onclick="setModo('escalada')">MODO ESCALADA</div>
            <div id="m-des" class="mode-btn" onclick="setModo('desafio')">10 RETOS FUERTES</div>
        </div>
        <div id="fase-tag" style="font-size: 12px; color: var(--accent);">NIVEL 1: CALENTAMIENTO</div>
    </div>

    <div class="dice-area">
        <div id="d1" class="dice">🎲</div>
        <div id="d2" class="dice">🎲</div>
    </div>

    <button id="btn-escalada" class="btn btn-main" onclick="jugar()">🔥 GIRAR DADOS</button>
    <button id="btn-desafio" class="btn btn-challenge" style="display:none;" onclick="lanzarReto()">😈 RETO EXTREMO</button>
    
    <div id="timer">00:00</div>
    <button id="btn-iniciar-timer" class="btn btn-start btn" onclick="activarReloj()">▶️ EMPEZAR RETO</button>

    <div id="resultado"></div>

    <script>
        let clicksEnNivel = 0;
        let nivel = 1;
        let timerInterval;
        let segundosPendientes = 0;
        const carasDado = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];

        const acciones = {
            fase1: [
                { t: "MASAJE CON LENGUA", p: "Lame desde su nuca hasta el coxis lentamente.", f: "Arquea la espalda y guía su cabeza.", s: 120 },
                { t: "SUCCIÓN DE PEZONES", p: "Succiona y muerde suavemente sus pezones.", f: "Masturba a Paulo con ritmo constante.", s: 180 },
                { t: "DEDOS EXPLORADORES", p: "Mete 3 dedos palma arriba y presiona el punto G.", f: "Aprieta tus músculos sobre sus dedos.", s: 240 },
                { t: "MORDISCO EN MUSLOS", p: "Da mordiscos firmes en la entrepierna de ella.", f: "Abre bien las piernas y míralo a los ojos.", s: 90 },
                { t: "ACICALAMIENTO", p: "Besa sus labios vaginales solo con la boca.", f: "Sostén su cabeza si quieres que se quede ahí.", s: 120 }
            ],
            fase2: [
                { t: "PERRITO DE RODILLAS", p: "Arrodillado erguido, empuja fuerte y profundo.", f: "Baja los codos, trasero lo más arriba posible.", s: 180 },
                { t: "MISIONERO ELEVADO", p: "Sujeta sus tobillos cerca de tus orejas al entrar.", f: "Pon almohadas bajo tu cadera y déjate llevar.", s: 240 },
                { t: "LA SILLA CABALGANTE", p: "Sentado, sujeta su cintura para marcar el ritmo.", f: "Sube y baja con todo tu peso sobre él.", s: 180 },
                { t: "CUCHARITA PROFUNDA", p: "Entra despacio pero llega al fondo cada vez.", f: "Empuja tu cadera hacia atrás para recibirlo todo.", s: 180 }
            ],
            fase3: [
                { t: "LA ARAÑA", p: "Sentado, balancéate de lado a lado dentro de ella.", f: "Cruza piernas en su espalda y aprieta fuerte.", s: 300 },
                { t: "EL MOLINILLO", p: "Sujeta sus nalgas y búscala con fuerza desde abajo.", f: "De espaldas sobre él, inclínate hasta tocar tus pies.", s: 300 },
                { t: "EL TRIÁNGULO", p: "Penetra con potencia máxima, pies de ella al hombro.", f: "Manos al suelo para equilibrio.", s: 200 },
                { t: "CLÍMAX LIBRE", p: "Termina con ella en la posición que quieras.", f: "Grita y disfruta el final.", s: 600 }
            ]
        };

        const retos = [
            { t: "GARGANTA PROFUNDA (PAULO RECIBE)", d: "Reto de resistencia oral extrema.", p: "Paulo: No te muevas, deja que ella controle la profundidad.", f: "Fernanda: Mete TODO a la boca y aguanta la respiración lo más que puedas sin sacarlo.", s: 120 },
            { t: "RESISTENCIA (FERNANDA RECIBE)", d: "Reto de aguante sensorial.", p: "Paulo: Lame su clítoris con mucha intensidad sin parar.", f: "Fernanda: Aguanta la respiración 15 segundos mientras él lo hace. Repite.", s: 120 },
            { t: "PAULO: COCINA EXTREMA", d: "Penetración en la cocina.", p: "Paulo: Cárgala contra el mostrador y dale fuerte 60 seg.", f: "Fernanda: Envuélvelo con tus piernas y aguanta el ritmo.", s: 60 },
            { t: "TRABALENGUAS PENETRADA", d: "Mente vs Placer.", p: "Paulo: Penétrala lo más rápido y fuerte que puedas.", f: "Fernanda: Di 'Tres tristes tigres' sin equivocarte.", s: 60 },
            { t: "TODO ADENTRO (ORDEÑO)", d: "Control muscular interno.", p: "Paulo: Mete todo y quédate inmóvil.", f: "Fernanda: Intenta sacarlo usando solo tus músculos.", s: 90 },
            { t: "NALGADAS RÍTMICAS", d: "Castigo y placer.", p: "Paulo: Da una nalgada fuerte en cada embestida profunda.", f: "Fernanda: Cuenta las nalgadas en voz alta.", s: 150 },
            { t: "EL MUÑECO DE TRAPO", d: "Fuerza de Paulo.", p: "Paulo: Levántala contra la pared y penétrala en el aire.", f: "Fernanda: Sujétate de su cuello y no toques el suelo.", s: 120 },
            { t: "SUMISIÓN: BOCA ABAJO", d: "Control total.", p: "Paulo: Ponla boca abajo. 10 nalgadas antes de entrar.", f: "Fernanda: Mantente quieta y acepta el castigo.", s: 180 },
            { t: "SILLA: EL CABALLITO", d: "Reto en silla.", p: "Paulo: Siéntate en la silla. Deja que ella tome el control.", f: "Fernanda: Siéntate sobre él de frente y bota con fuerza.", s: 150 },
            { t: "RESISTENCIA FINAL", d: "Velocidad máxima.", p: "Paulo: Dale a máxima velocidad por 2 minutos.", f: "Fernanda: Mantenlas piernas abiertas al máximo.", s: 120 }
        ];

        function setModo(m) {
            document.getElementById('m-esc').className = 'mode-btn ' + (m=='escalada'?'active':'');
            document.getElementById('m-des').className = 'mode-btn ' + (m=='desafio'?'active':'');
            document.getElementById('btn-escalada').style.display = m=='escalada'?'inline-block':'none';
            document.getElementById('btn-desafio').style.display = m=='desafio'?'inline-block':'none';
            resetUI();
        }

        function resetUI() {
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = "00:00";
            document.getElementById('btn-iniciar-timer').style.display = "none";
            document.getElementById('resultado').innerHTML = "";
        }

        function hablar(texto) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-ES';
            window.speechSynthesis.speak(msg);
        }

        function jugar() {
            clicksEnNivel++;
            if(clicksEnNivel > 4) { nivel++; clicksEnNivel = 0; } 
            let lista = nivel <= 2 ? acciones.fase1 : (nivel <= 4 ? acciones.fase2 : acciones.fase3);
            mostrar(lista[Math.floor(Math.random() * lista.length)], '#00f2ff');
            document.getElementById('fase-tag').innerText = "NIVEL " + nivel;
        }

        function lanzarReto() {
            mostrar(retos[Math.floor(Math.random() * retos.length)], '#ffd700');
        }

        function mostrar(item, color) {
            resetUI();
            const d1 = document.getElementById('d1');
            const d2 = document.getElementById('d2');
            d1.classList.add('rolling');
            d2.classList.add('rolling');
            segundosPendientes = item.s;

            setTimeout(() => {
                d1.classList.remove('rolling');
                d2.classList.remove('rolling');
                d1.innerText = carasDado[Math.floor(Math.random()*6)];
                d2.innerText = carasDado[Math.floor(Math.random()*6)];
                
                document.getElementById('resultado').innerHTML = `
                    <div class="card" style="border-left-color:${color}">
                        <div class="card-t">${item.t}</div>
                        ${item.d ? `<div class="card-d">${item.d}</div>` : ''}
                        <div class="role-box">
                            <div class="role p-color"><b>♂ PAULO:</b> ${item.p}</div>
                            <div class="role f-color"><b>♀ FERNANDA:</b> ${item.f}</div>
                        </div>
                    </div>
                `;
                hablar(item.t);
                document.getElementById('btn-iniciar-timer').style.display = "inline-block";
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 600);
        }

        function activarReloj() {
            document.getElementById('btn-iniciar-timer').style.display = "none";
            iniciarTimer(segundosPendientes);
        }

        function iniciarTimer(s) {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let m = Math.floor(s/60); let r = s%60;
                document.getElementById('timer').innerText = `${m}:${r<10?'0':''}${r}`;
                if(s-- <= 0) { 
                    clearInterval(timerInterval); 
                    hablar("¡Tiempo fuera!"); 
                }
            }, 1000);
        }
    </script>
</body>
</html>
