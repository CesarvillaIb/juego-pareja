<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Paulo & Fernanda 🔥</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

button {
  margin: 10px;
  padding: 18px;
  font-size: 20px;
  border: none;
  border-radius: 15px;
  background: #ff0033;
  color: white;
  width: 90%;
}

.dice {
  font-size: 80px;
  margin: 20px;
  transition: transform 0.5s;
}

.card {
  background: rgba(255,255,255,0.1);
  margin: 10px;
  padding: 15px;
  border-radius: 15px;
}
</style>
</head>

<body>

<h1>🔥 Paulo & Fernanda 🔥</h1>

<div id="turno"></div>

<div class="dice" id="dice">🎲</div>

<button onclick="tirar()">🎲 LANZAR</button>
<button onclick="modoExtremo()">🎮 RETO O CASTIGO</button>

<div id="resultado"></div>

<script>
let turno = 1;
let nivel = 0;

const nombres = ["Paulo", "Fernanda"];

const retos = [
  "Toma el control completamente 😈",
  "Guía el ritmo sin detenerte",
  "Provoca lentamente sin dejar avanzar",
  "Haz que pierda el control poco a poco"
];

const castigos = [
  "Obedeces todo sin decidir 😈",
  "No puedes detenerte",
  "Sin hablar durante el turno",
  "Tu pareja controla todo"
];

function actualizarTurno() {
  document.getElementById("turno").innerText =
    "Turno: " + nombres[turno - 1];
}

function animarDado() {
  const dice = document.getElementById("dice");
  dice.style.transform = "rotate(720deg)";
}

function tirar() {
  nivel++;
  animarDado();

  let intensidad = "🔥";
  if(nivel > 5) intensidad = "😈🔥";

  document.getElementById("resultado").innerHTML = `
    <div class="card">Nivel: ${intensidad}</div>
  `;

  turno = turno === 1 ? 2 : 1;
  actualizarTurno();
}

function modoExtremo() {
  animarDado();

  let tipo = Math.random() > 0.5 ? "reto" : "castigo";

  if(tipo === "reto") {
    let r = retos[Math.floor(Math.random()*retos.length)];
    document.getElementById("resultado").innerHTML = `
      <div class="card">🔥 RETO: ${r}</div>
    `;
  } else {
    let c = castigos[Math.floor(Math.random()*castigos.length)];
    document.getElementById("resultado").innerHTML = `
      <div class="card">😈 CASTIGO: ${c}</div>
    `;
  }
}

// registrar service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

actualizarTurno();
</script>

</body>
</html>
