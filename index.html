<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 P & F: Acción Directa 🔥</title>
    <style>
        :root { --red: #ff0033; --purple: #8a2be2; --bg: #000; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; text-align: center; padding: 15px; }
        h1 { color: var(--red); font-size: 22px; text-shadow: 0 0 10px var(--red); }
        #turno { font-size: 20px; margin: 10px 0; color: #eee; }
        .btn { margin: 8px; padding: 18px; font-size: 18px; font-weight: bold; border: none; border-radius: 12px; color: white; width: 90%; max-width: 320px; cursor: pointer; }
        .btn-fire { background: linear-gradient(45deg, var(--red), #b30024); box-shadow: 0 4px 15px rgba(255,0,51,0.5); }
        .btn-dark { background: #222; border: 1px solid var(--purple); font-size: 14px; padding: 12px; }
        #dice { font-size: 60px; margin: 10px; transition: transform 0.5s ease; display: inline-block; }
        .card { background: #111; border-left: 5px solid var(--red); padding: 15px; margin-top: 10px; border-radius: 10px; text-align: left; animation: pop 0.3s ease; }
        .card-t { font-size: 14px; color: #888; margin-bottom: 5px; }
        .card-x { font-size: 20px; font-weight: bold; }
        #timer { font-size: 60px; font-weight: bold; margin-top: 20px; color: var(--red); font-family: monospace; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <h1>🔥 PAULO & FERNANDA 🔥</h1>
    <div id="turno">Turno: Paulo</div>
    <div id="dice">🎲</div>

    <button class="btn btn-fire" onclick="tirar()">🔥 SIGUIENTE PASO</button>
    <button class="btn btn-dark" onclick="modoExtremo()">😈 RETO SUCIO</button>

    <div id="resultado"></div>
    <div id="timer">00:00</div>

    <script>
        let turno = 0;
        let nivel = 1;
        let timerInterval;
        const nombres = ["Paulo", "Fernanda"];

        // CONFIGURACIÓN DE ACCIONES Y TIEMPOS EXACTOS
        const acciones = [
            { t: "Beso francés salvaje y agresivo", s: 60 },
            { t: "Sexo oral intenso (recibe Paulo)", s: 120 },
            { t: "Sexo oral intenso (recibe Fernanda)", s: 120 },
            { t: "Meter los dedos en la vagina (estimulación profunda)", s: 300 }, // 5 min
            { t: "Perrito salvaje: ¡Dale duro!", s: 60 }, // 1 min
            { t: "Fernanda arriba: Control total del ritmo", s: 120 },
            { t: "Misionero con piernas al hombro", s: 120 },
            { t: "Provocación: Lame sus partes íntimas lentamente", s: 60 },
            { t: "Acaricia y muerde sus pezones con fuerza", s: 60 },
            { t: "Masajea el clítoris mientras la besas", s: 180 }
        ];

        const castigos = [
            "Nalgada fuerte cada vez que el otro gima",
            "No puedes tocar con las manos este turno",
            "Venda en los ojos inmediata",
            "Pausa de 30 segundos mirando fijo a los ojos (sin tocar)"
        ];

        function actualizarTurno() {
            document.getElementById("turno").innerText = "Turno: " + nombres[turno];
        }

        function iniciarTimer(segundos) {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let min = Math.floor(segundos / 60);
                let sec = segundos % 60;
                document.getElementById("timer").innerText = `${min}:${sec < 10 ? "0" : ""}${sec}`;
                
                if (segundos <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById("timer").innerText = "💦 CAMBIO 💦";
                    if (navigator.vibrate) navigator.vibrate([400, 100, 400]);
                }
                segundos--;
            }, 1000);
        }

        function tirar() {
            const dice = document.getElementById("dice");
            dice.style.transform = `rotate(${nivel * 360}deg)`;

            const item = acciones[Math.floor(Math.random() * acciones.length)];

            document.getElementById("resultado").innerHTML = `
                <div class="card">
                    <div class="card-t">NIVEL ${nivel}</div>
                    <div class="card-x">${item.t}</div>
                </div>
            `;

            iniciarTimer(item.s);
            nivel++;
            turno = (turno === 0) ? 1 : 0;
            actualizarTurno();
        }

        function modoExtremo() {
            const c = castigos[Math.floor(Math.random() * castigos.length)];
            document.getElementById("resultado").innerHTML += `
                <div class="card" style="border-left-color: var(--purple)">
                    <div class="card-t" style="color: var(--purple)">RETO EXTRA</div>
                    <div class="card-x">${c}</div>
                </div>
            `;
            if (navigator.vibrate) navigator.vibrate(200);
        }

        actualizarTurno();
    </script>
</body>
</html>
