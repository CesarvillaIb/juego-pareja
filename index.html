<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔥 PAULO & FERNANDA: EXTREME 🔥</title>
    <style>
        :root { 
            --accent: #00f2ff; --bg: #050505; --card-bg: #111;
            --gold: #ffd700; --deep-red: #ff0033; --purple: #a020f0; --pink: #ff1493; --green: #2ecc71;
            --flash: #ff0000;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { 
            margin: 0; font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: white; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
        }
        .header { 
            padding: 45px 20px 15px; background: rgba(0,0,0,0.95); 
            border-bottom: 2px solid var(--deep-red); position: fixed; top: 0; width: 100%; z-index: 100;
        }
        .content { 
            flex: 1; margin-top: 100px; margin-bottom: 85px; 
            overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        
        /* CONTENEDOR DE ANIMACIONES */
        .visual-container { position: relative; height: 150px; display: flex; align-items: center; justify-content: center; width: 100%; }
        .particle { position: absolute; pointer-events: none; border-radius: 50%; opacity: 0; z-index: 1; }

        .icon-circle { 
            width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--accent);
            display: flex; align-items: center; justify-content: center; font-size: 50px;
            background: radial-gradient(circle, rgba(0,242,255,0.1) 0%, transparent 70%);
            z-index: 5; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* RULETA */
        .ruleta-box { display: none; position: relative; width: 160px; height: 160px; }
        .flecha { 
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 25px solid var(--deep-red); z-index: 10;
        }
        #wheel { 
            width: 100%; height: 100%; border-radius: 50%; border: 5px solid white;
            transition: transform 3.5s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(#3498db 0% 50%, var(--pink) 50% 100%);
        }

        /* UI CONTROLES */
        #timer { font-size: 60px; font-weight: 900; margin: 10px 0; font-family: 'Courier New', monospace; text-shadow: 0 0 15px var(--accent); }
        .btn { width: 100%; max-width: 320px; padding: 18px; border: none; border-radius: 20px; font-size: 16px; font-weight: 800; color: white; margin-bottom: 10px; transition: 0.2s; text-transform: uppercase; }
        .btn:active { transform: scale(0.95); opacity: 0.9; }
        
        .btn-main { background: linear-gradient(45deg, var(--deep-red), var(--purple)); box-shadow: 0 4px 15px rgba(255,0,51,0.3); }
        .btn-flash { background: linear-gradient(45deg, #f00, #b00); box-shadow: 0 0 20px rgba(255,0,0,0.5); animation: pulseFlash 1.5s infinite; }
        .btn-start { background: var(--green); display: none; box-shadow: 0 0 20px var(--green); margin-top: 10px; }

        @keyframes pulseFlash { 0% { box-shadow: 0 0 10px #f00; } 50% { box-shadow: 0 0 25px #f00; } 100% { box-shadow: 0 0 10px #f00; } }

        /* TARJETAS */
        .card { 
            background: var(--card-bg); border-left: 6px solid var(--accent); padding: 20px; 
            border-radius: 18px; text-align: left; width: 100%; max-width: 400px; margin-top: 15px;
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .flash-active { background: #200 !important; border: 2px solid var(--flash) !important; border-left: 6px solid var(--flash) !important; }

        @keyframes bounceIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .card-t { font-size: 19px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .role-p { color: #5dade2; margin-top: 10px; font-size: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; line-height: 1.4; }
        .role-f { color: #ec7063; margin-top: 10px; font-size: 15px; line-height: 1.4; }

        /* NAV */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 85px; background: #000;
            display: flex; justify-content: space-around; border-top: 1px solid #222; z-index: 100;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; color: #444; }
        .nav-item.active { color: var(--accent); }
        .nav-item.special { color: var(--flash); font-weight: bold; }
        .nav-item span { font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">

        <div id="fase-tag" style="text-align:center; font-size:10px; color:var(--accent); font-weight: bold;">MODO: PREPARACIÓN</div>
    </div>

    <div class="content" id="main-scroll">
        <div class="visual-container" id="v-cont">
            <div class="icon-circle" id="mode-icon">🔥</div>
            <div class="ruleta-box" id="ruleta-ui">
                <div class="flecha"></div>
                <div id="wheel"></div>
            </div>
        </div>

        <div id="action-area" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>

        <div id="timer">00:00</div>
        <button id="btn-timer" class="btn btn-start" onclick="activarReloj()">▶️ EMPEZAR AHORA</button>

        <div id="resultado"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="setModo('escalada', this)"><span>🔥</span>ESCALADA</div>
        <div class="nav-item" onclick="setModo('desafio', this)"><span>😈</span>RETOS</div>
        <div class="nav-item special" onclick="setModo('flash', this)"><span>⚡</span>FLASH</div>
        <div class="nav-item" onclick="setModo('combinados', this)"><span>🎲</span>DADOS</div>
        <div class="nav-item" onclick="setModo('ruleta', this)"><span>🎡</span>RULETA</div>
    </div>

<script>
    let nivel = 1; let clicksNivel = 0; let timerInterval; let segundosPendientes = 0; let rotation = 0;

    // --- TUS LISTAS DE ACCIONES (INTACTAS) ---
    const acciones = {
        fase1: [
            { t: "MASAJE CON LENGUA", d: "Exploración sensorial de la espalda.", p: "Fernanda boca abajo. Lame desde su nuca, bajando por cada vértebra hasta el coxis, alternando besos húmedos con soplos de aire.", f: "Mantén los brazos estirados hacia adelante, cierra los ojos y arquea la espalda lentamente al sentir su lengua.", s: 120 },
            { t: "SUCCIÓN DE PEZONES", d: "Estimulación de puntos altos.", p: "Succiona un pezón con suavidad mientras masajeas el otro con los dedos. Aumenta la intensidad y muerde muy levemente.", f: "Cruza tus piernas sobre la espalda de Paulo y mastúrbalo con un ritmo constante mientras él te saborea.", s: 180 },
            { t: "DEDOS EXPLORADORES (PUNTO G)", d: "Búsqueda del placer interno.", p: "Introduce dos dedos con la palma hacia arriba. Haz el movimiento de 'ven aquí' buscando la zona rugosa superior interna.", f: "Aprieta tus músculos vaginales sobre sus dedos cada vez que él presione. No dejes de mirarlo.", s: 240 },
            { t: "MORDISCO EN MUSLOS", d: "Apertura y control.", p: "Sujeta sus rodillas y ábrelas al máximo. Da mordiscos firmes en la cara interna del muslo, acercándote a su entrepierna sin tocarla aún.", f: "Agárrate de las sábanas, respira fuerte y mantén el contacto visual con Paulo mientras él te marca.", s: 120 },
            { t: "LENGUA MARIPOSA", d: "Roce externo ultra sensible.", p: "Usa la punta de tu lengua solo en el clítoris, con movimientos rápidos y suaves como el aleteo de una mariposa.", f: "Guía la cabeza de Paulo con tus manos si necesitas más o menos presión. No cierres las piernas.", s: 150 }
        ],
        fase2: [
            { t: "PERRITO DE RODILLAS", d: "Penetración profunda y animal.", p: "Arrodillado erguido detrás de ella. Penétrala con empujes largos, llegando al fondo en cada movimiento.", f: "Apoya los codos en la cama y baja el pecho. Sube el trasero lo más que puedas para facilitar la entrada profunda.", s: 180 },
            { t: "MISIONERO ELEVADO", d: "Conexión total y visual.", p: "Colócate sobre ella. Sujeta sus tobillos y súbelos hasta que sus rodillas queden cerca de sus orejas antes de entrar.", f: "Pon almohadas bajo tu cadera. Envuelve el cuello de Paulo con tus brazos y gime cerca de su oído.", s: 240 },
            { t: "LA SILLA CABALGANTE", d: "Ella toma las riendas.", p: "Siéntate en el borde de la cama o una silla. Sujeta la cintura de Fernanda para que no pierda el equilibrio.", f: "Siéntate sobre él de frente. Usa tus pies apoyados en el suelo o la cama para subir y bajar con todo tu peso.", s: 180 },
            { t: "CUCHARITA PROFUNDA", d: "Intimidad piel con piel.", p: "Ambos de lado. Entra por detrás muy despacio. Usa una mano para acariciar su pecho mientras la penetras.", f: "Empuja tu cadera hacia atrás rítmicamente. Siente el roce de su pecho contra tu espalda.", s: 200 }
        ],
        fase3: [
            { t: "EL MOLINILLO", d: "Giro y profundidad máxima.", p: "Ella boca arriba. Sujeta sus nalgas con fuerza y levántalas un poco del colchón mientras entras con potencia.", f: "Apoya tus manos atrás para impulsarte. Intenta rotar tu cadera en círculos mientras él está adentro.", s: 300 },
            { t: "CLÍMAX LIBRE", d: "Final explosivo.", p: "Elige la posición que más te excite ahora mismo y busca tu final con intensidad.", f: "No te guardes nada. Grita, aprieta y disfruta el momento final con Paulo.", s: 600 }
        ]
    };

    const retos = [
        { t: "EL 69", d: "Placer dual invertido.", p: "Acuéstate boca arriba. Fernanda se coloca sobre ti pero al revés.", f: "Tu cara en su entrepierna, tu sexo sobre su boca. Trabajen juntos.", s: 180 },
        { t: "MISIONERO: TOBILLOS AL HOMBRO", d: "Ángulo de penetración extrema.", p: "Sube sus pies hasta tus hombros. Esto permitirá entrar más profundo.", f: "Sujeta sus manos. Levanta la pelvis para recibir cada embestida.", s: 150 },
        { t: "LA POSICIÓN 'W'", d: "Apertura total de caderas.", p: "Penétrala mientras ella dobla sus rodillas hacia afuera al máximo.", f: "Piernas abiertas en W. Deja el camino totalmente libre.", s: 150 },
        { t: "LA FUSIÓN", d: "Sexo sentado con cercanía total.", p: "Siéntate con las piernas cruzadas. Ella se sienta sobre tu regazo.", f: "Abrázalo por el cuello. Muévete subiendo y bajando.", s: 180 },
        { t: "VAQUERA EN CUCLILLAS", d: "Control total de Fernanda.", p: "Acostado. Manos en sus caderas para ayudarla a bajar con fuerza.", f: "Ponte en cuclillas sobre él, subiendo y bajando rápido.", s: 150 },
        { t: "VAQUERA INVERTIDA", d: "Placer visual y profundidad.", p: "Disfruta del espectáculo de su espalda arqueándose.", f: "De espaldas a Paulo, siéntate e inclina tu cuerpo hacia adelante.", s: 150 },
        { t: "GARGANTA PROFUNDA (RETO)", d: "Entrega total oral.", p: "Quédate quieto. Deja que ella decida hasta dónde llegar.", f: "Introduce su miembro lo más profundo posible.", s: 120 },
        { t: "RESISTENCIA (FERNANDA RECIBE)", d: "Reto de aguante sensorial.", p: "Lame su clítoris con velocidad constante y frenética.", f: "No cierres las piernas. Aguanta el placer sin moverte.", s: 120 },
        { t: "PAULO: COCINA EXTREMA", d: "Sexo en el mostrador.", p: "Cárgala y siéntala en el mostrador. Dale con fuerza bruta.", f: "Cruza tus piernas con fuerza en su espalda.", s: 60 },
        { t: "TRABALENGUAS PENETRADA", d: "Mente vs Cuerpo.", p: "Dale con tu máximo ritmo en posición perrito.", f: "Di 'Tres tristes tigres' sin equivocarte mientras te penetra.", s: 60 },
        { t: "TODO ADENTRO (ORDEÑO)", d: "Succión vaginal.", p: "Introduce todo tu miembro y quédate 100% inmóvil.", f: "Intenta 'ordeñarlo' usando solo tus músculos internos.", s: 90 },
        { t: "NALGADAS RÍTMICAS", d: "Estímulo sonoro y físico.", p: "Da una nalgada fuerte cada vez que entres al fondo.", f: "Cuenta las nalgadas en voz alta.", s: 150 },
        { t: "EL MUÑECO DE TRAPO", d: "Paulo toma el mando.", p: "Levántala contra la pared y penétrala sin que toque el suelo.", f: "Sujétate de su cuello. Mantente en el aire con tus piernas.", s: 120 },
        { t: "SUMISIÓN: BOCA ABAJO", d: "Control total de Paulo.", p: "Ponla boca abajo, nalgas arriba. 10 nalgadas y entra sin avisar.", f: "Cara contra la almohada. Acepta su ritmo.", s: 180 },
        { t: "SILLA: EL CABALLITO", d: "Vaquera rítmica.", p: "Siéntate en una silla firme.", f: "Siéntate sobre él mirando hacia adelante y rebota con fuerza.", s: 150 },
        { t: "RESISTENCIA FINAL", d: "Velocidad máxima.", p: "Dale a máxima velocidad por 2 minutos sin detenerte.", f: "Piernas abiertas al máximo para recibir todo el impacto.", s: 120 }
    ];

    const castigosP = [{ t: "CASTIGO PAULO", d: "Esclavo del clítoris.", p: "Solo lengua y labios. Círculos rápidos por 5 min. Manos atrás.", f: "Siéntate en su cara. Tú mandas el ritmo.", s: 300 }];
    const castigosF = [{ t: "CASTIGO FERNANDA", d: "Sometimiento oral.", p: "Termina sobre su cara.", f: "No te limpies hasta que él lo diga.", s: 300 }];

    const intensidades = ["con fuerza bruta 😈", "con lentitud torturante 😏", "rápido y desesperado ⚡", "marcando el ritmo con nalgadas 🍑"];

    // --- MODO FLASH ADRENALINA ---
    const lugaresFlash = ["en el SOFÁ", "en la MESA", "en el SUELO", "contra la PARED", "en la CAMA"];
    const accionesFlash = ["Sexo rudo", "Oral intenso", "Perrito profundo", "Vaquera salvaje", "69 urgente", "Nalgadas y penetración"];

    // --- SISTEMA DE ANIMACIÓN ---
    function burst(color) {
        const cont = document.getElementById('v-cont');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.classList.add('particle'); p.style.backgroundColor = color;
            p.style.width = p.style.height = Math.random() * 8 + 4 + 'px';
            p.style.left = '50%'; p.style.top = '50%';
            cont.appendChild(p);
            const angle = Math.random() * Math.PI * 2; const dist = Math.random() * 120 + 40;
            p.animate([{ transform: 'translate(-50%, -50%) scale(1)', opacity: 1 }, 
                       { transform: `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px)) scale(0)`, opacity: 0 }], 
                       { duration: 800, easing: 'ease-out' }).onfinish = () => p.remove();
        }
        document.getElementById('mode-icon').style.transform = 'scale(1.3)';
        setTimeout(() => document.getElementById('mode-icon').style.transform = 'scale(1)', 200);
    }

    // --- LÓGICA DE MODOS ---
    function setModo(modo, el) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active'); resetTodo();
        const icon = document.getElementById('mode-icon'); const ruleta = document.getElementById('ruleta-ui'); const area = document.getElementById('action-area');
        
        icon.style.display = modo === 'ruleta' ? "none" : "flex";
        ruleta.style.display = modo === 'ruleta' ? "block" : "none";

        if(modo === 'flash') {
            icon.innerText = "⚡"; icon.style.borderColor = "var(--flash)";
            area.innerHTML = '<button class="btn btn-flash" onclick="lanzarFlash()">⚡ ACCIÓN FLASH AHORA</button>';
            document.getElementById('fase-tag').innerText = "MODO FLASH: SIN TIEMPO";
        } else if(modo === 'escalada') {
            icon.innerText = "🔥"; icon.style.borderColor = "var(--accent)";
            area.innerHTML = '<button class="btn btn-main" onclick="jugar()">🔥 SIGUIENTE PASO</button>';
            document.getElementById('fase-tag').innerText = "NIVEL " + nivel;
        } else if(modo === 'desafio') {
            icon.innerText = "😈"; icon.style.borderColor = "var(--gold)";
            area.innerHTML = '<button class="btn btn-main" style="background:var(--gold);color:black" onclick="lanzarReto()">😈 OTRO RETO</button>';
            document.getElementById('fase-tag').innerText = "MODO RETOS";
        } else if(modo === 'combinados') {
            icon.innerText = "🎲"; icon.style.borderColor = "var(--purple)";
            area.innerHTML = '<button class="btn btn-main" style="background:var(--purple)" onclick="lanzarDados()">🎲 NUEVA MEZCLA</button>';
            document.getElementById('fase-tag').innerText = "MODO DADOS";
        } else if(modo === 'ruleta') {
            area.innerHTML = '<button class="btn btn-main" style="background:var(--pink)" onclick="girarRuleta()">🎡 GIRAR RULETA</button>';
            document.getElementById('fase-tag').innerText = "RULETA DEL CASTIGO";
        }
    }

    function resetTodo() { clearInterval(timerInterval); document.getElementById('timer').innerText = "00:00"; document.getElementById('btn-timer').style.display = "none"; document.getElementById('resultado').innerHTML = ""; }

    function lanzarFlash() {
        resetTodo(); burst('#ff0000'); if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        const a = accionesFlash[Math.floor(Math.random() * accionesFlash.length)];
        const l = lugaresFlash[Math.floor(Math.random() * lugaresFlash.length)];
        segundosPendientes = 60;
        document.getElementById('resultado').innerHTML = `
            <div class="card flash-active">
                <div class="card-t" style="color:red">⚡ FLASH EXTREMO ⚡</div>
                <div style="font-size:22px; color:white; font-weight:900; margin:15px 0; text-align:center;">${a.toUpperCase()}</div>
                <div style="font-size:18px; color:var(--gold); text-align:center;">📍 EN EL/LA ${l}</div>
            </div>`;
        document.getElementById('btn-timer').style.display = "block";
    }

    function jugar() { 
        resetTodo(); burst('var(--accent)'); 
        let lista = nivel == 1 ? acciones.fase1 : (nivel == 2 ? acciones.fase2 : acciones.fase3);
        mostrar(lista[Math.floor(Math.random() * lista.length)], 'var(--accent)');
        clicksNivel++; if(clicksNivel > 4){ nivel++; clicksNivel = 0; document.getElementById('fase-tag').innerText = "NIVEL " + nivel; }
    }

    function lanzarReto() { resetTodo(); burst('var(--gold)'); mostrar(retos[Math.floor(Math.random() * retos.length)], 'var(--gold)'); }

    function lanzarDados() {
        resetTodo(); burst('var(--purple)');
        const item = { t: "DADOS MIXTOS", d: "Combinación salvaje.", p: `Atrévete con lo que salga, ${intensidades[Math.floor(Math.random()*4)]}`, f: "Sigue el ritmo de Paulo sin quejarte.", s: 180 };
        mostrar(item, 'var(--purple)');
    }

    function girarRuleta() {
        resetTodo(); rotation += Math.floor(Math.random() * 360) + 1440;
        document.getElementById('wheel').style.transform = `rotate(${rotation}deg)`;
        setTimeout(() => {
            let q = (rotation % 360 <= 180) ? "PAULO" : "FERNANDA";
            burst(q === "PAULO" ? '#3498db' : 'var(--pink)');
            const c = q === "PAULO" ? castigosP[0] : castigosF[0];
            mostrar(c, 'var(--pink)');
        }, 3500);
    }

    function mostrar(item, color) {
        segundosPendientes = item.s;
        document.getElementById('resultado').innerHTML = `
            <div class="card" style="border-left-color:${color}">
                <div class="card-t" style="color:${color}">${item.t}</div>
                <div style="font-size:11px; color:#666; margin-bottom:10px;">${item.d}</div>
                <div class="role-p"><b>♂ PAULO:</b> ${item.p}</div>
                <div class="role-f"><b>♀ FERNANDA:</b> ${item.f}</div>
            </div>`;
        document.getElementById('btn-timer').style.display = "block";
    }

    function activarReloj() {
        document.getElementById('btn-timer').style.display = "none";
        let s = segundosPendientes;
        timerInterval = setInterval(() => {
            let m = Math.floor(s/60); let r = s%60;
            document.getElementById('timer').innerText = `${m}:${r<10?'0':''}${r}`;
            if(s-- <= 0) { 
                clearInterval(timerInterval); document.getElementById('timer').innerText = "¡TIEMPO!";
                if (navigator.vibrate) navigator.vibrate([500, 100, 500]);
            }
        }, 1000);
    }

    setModo('escalada', document.querySelector('.nav-item'));
</script>
</body>
</html>
